<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.16"/>
      <stop offset="55%" stop-color="#38bdf8" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c2430"/>
      <stop offset="100%" stop-color="#12161d"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="600" fill="#0d1117"/>
  <rect width="1200" height="600" fill="url(#glow)"/>

  <g stroke="#30363d" stroke-opacity="0.18" stroke-width="1">
    <path d="M0 150 H1200 M0 300 H1200 M0 450 H1200"/>
    <path d="M300 0 V600 M600 0 V600 M900 0 V600"/>
  </g>

  <text x="600" y="62" text-anchor="middle" fill="#38bdf8" font-size="17" letter-spacing="4" font-weight="600">VIBE&#160;&#160;ENGINEERING&#160;&#160;·&#160;&#160;LES&#160;&#160;FONDATIONS</text>

  <!-- Left card: the base prompt as a blueprint document -->
  <g>
    <rect x="70" y="104" width="340" height="380" rx="16" fill="url(#card)" stroke="#ffa657" stroke-width="2"/>
    <text x="240" y="150" text-anchor="middle" fill="#e6edf3" font-size="23" font-weight="700">LE PROMPT DE BASE</text>
    <text x="240" y="176" text-anchor="middle" fill="#9198a1" font-size="14">le cahier des charges de l'architecte</text>

    <g fill="#9198a1" font-size="14">
      <circle cx="108" cy="216" r="4" fill="#38bdf8"/>
      <text x="126" y="221" fill="#e6edf3">comprendre le besoin d'abord</text>
      <circle cx="108" cy="252" r="4" fill="#38bdf8"/>
      <text x="126" y="257" fill="#e6edf3">pile explicite, versions comprises</text>
      <circle cx="108" cy="288" r="4" fill="#38bdf8"/>
      <text x="126" y="293" fill="#e6edf3">une architecture qui sert de moule</text>
      <circle cx="108" cy="324" r="4" fill="#38bdf8"/>
      <text x="126" y="329" fill="#e6edf3">tests : après le premier jet vérifié</text>
      <circle cx="108" cy="360" r="4" fill="#38bdf8"/>
      <text x="126" y="365" fill="#e6edf3">chaque décision consignée (ADR)</text>
    </g>

    <rect x="100" y="400" width="240" height="8" rx="4" fill="#21262d"/>
    <rect x="100" y="400" width="192" height="8" rx="4" fill="#ffa657"/>
    <text x="240" y="440" text-anchor="middle" fill="#ffa657" font-size="13" font-weight="600">1 page, toutes les décisions</text>
  </g>

  <!-- Arrow -->
  <path d="M430 294 H492 l-10 -9 M492 294 l-10 9" stroke="#6e7681" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Right: the building -->
  <g>
    <!-- roof -->
    <path d="M600 148 L810 108 L1020 148 L1020 168 L600 168 Z" fill="#1c2430" stroke="#bc8cff" stroke-width="2"/>
    <text x="810" y="160" text-anchor="middle" fill="#bc8cff" font-size="15" font-weight="600">Blazor + Fluent UI</text>

    <!-- floor 3 -->
    <rect x="620" y="178" width="380" height="56" rx="8" fill="url(#card)" stroke="#38bdf8" stroke-width="2"/>
    <text x="810" y="204" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="600">découpe moléculaire</text>
    <text x="810" y="224" text-anchor="middle" fill="#9198a1" font-size="12">atomes · molécules · organismes</text>

    <!-- floor 2 -->
    <rect x="620" y="244" width="380" height="56" rx="8" fill="url(#card)" stroke="#38bdf8" stroke-width="2"/>
    <text x="810" y="270" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="600">CQRS · Carter · MediatR</text>
    <text x="810" y="290" text-anchor="middle" fill="#9198a1" font-size="12">commandes / requêtes séparées</text>

    <!-- floor 1 -->
    <rect x="620" y="310" width="380" height="56" rx="8" fill="url(#card)" stroke="#38bdf8" stroke-width="2"/>
    <text x="810" y="336" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="600">tests AAA · couverture 80 %</text>
    <text x="810" y="356" text-anchor="middle" fill="#9198a1" font-size="12">après le premier jet validé</text>

    <!-- foundation slab -->
    <rect x="600" y="376" width="420" height="60" rx="8" fill="#1c2430" stroke="#3fb950" stroke-width="3"/>
    <text x="810" y="402" text-anchor="middle" fill="#3fb950" font-size="16" font-weight="700">.NET 10 · C# moderne · CPM · slnx</text>
    <text x="810" y="422" text-anchor="middle" fill="#9198a1" font-size="12">la dalle : outillage à jour, une source de vérité</text>

    <!-- ground line -->
    <path d="M560 436 H1060" stroke="#30363d" stroke-width="2"/>

    <!-- docs sign -->
    <path d="M566 436 V386" stroke="#6e7681" stroke-width="3"/>
    <rect x="522" y="360" width="88" height="30" rx="5" fill="#12161d" stroke="#ffa657" stroke-width="2"/>
    <text x="566" y="380" text-anchor="middle" fill="#ffa657" font-size="13" font-weight="600">docs/adr</text>
  </g>

  <text x="600" y="560" text-anchor="middle" fill="#6e7681" font-size="16" letter-spacing="2">
    LES  FONDATIONS  D'ABORD  ·  FOUNDATIONS  FIRST
  </text>
</svg>
