<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#3fb950" stop-opacity="0.15"/>
      <stop offset="55%" stop-color="#3fb950" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c2430"/>
      <stop offset="100%" stop-color="#12161d"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="600" fill="#0d1117"/>
  <rect width="1200" height="600" fill="url(#glow)"/>

  <g stroke="#30363d" stroke-opacity="0.18" stroke-width="1">
    <path d="M0 150 H1200 M0 300 H1200 M0 450 H1200"/>
    <path d="M300 0 V600 M600 0 V600 M900 0 V600"/>
  </g>

  <text x="600" y="62" text-anchor="middle" fill="#38bdf8" font-size="17" letter-spacing="4" font-weight="600">MICROSOFT.EXTENSIONS.AI&#160;&#160;&#183;&#160;&#160;&#201;PISODE&#160;&#160;4/5</text>
  <text x="600" y="100" text-anchor="middle" fill="#e6edf3" font-size="30" font-weight="700">En local : Ollama et Foundry Local</text>

  <!-- crossed-out cloud -->
  <g>
    <path d="M170 240 q-30 0 -30 -25 q0 -25 28 -25 q7 -28 38 -28 q30 0 38 24 q30 -2 34 22 q4 27 -26 32 Z" fill="#12161d" stroke="#6e7681" stroke-width="2"/>
    <path d="M130 165 L285 250" stroke="#f85149" stroke-width="3.5"/>
    <path d="M285 165 L130 250" stroke="#f85149" stroke-width="3.5"/>
    <text x="207" y="285" text-anchor="middle" fill="#9198a1" font-size="12.5">z&#233;ro cloud &#183; z&#233;ro cl&#233; d'API</text>
    <text x="207" y="330" text-anchor="middle" fill="#3fb950" font-size="16" font-weight="700">0 &#8364; / token</text>
    <text x="207" y="370" text-anchor="middle" fill="#9198a1" font-size="12.5">vos donn&#233;es restent ici</text>
  </g>

  <!-- Ollama card -->
  <g>
    <rect x="360" y="170" width="360" height="250" rx="16" fill="url(#card)" stroke="#bc8cff" stroke-width="2"/>
    <text x="540" y="205" text-anchor="middle" fill="#bc8cff" font-size="17" font-weight="700">OLLAMA</text>
    <text x="540" y="232" text-anchor="middle" fill="#9198a1" font-size="12.5">le couteau suisse communautaire</text>
    <rect x="390" y="250" width="300" height="36" rx="8" fill="#12161d" stroke="#30363d" stroke-width="1.5"/>
    <text x="540" y="274" text-anchor="middle" fill="#e6edf3" font-size="13" font-family="Consolas, monospace">new OllamaApiClient(url, model)</text>
    <text x="540" y="315" text-anchor="middle" fill="#e6edf3" font-size="13">chat + embeddings (bge-m3&#8230;)</text>
    <text x="540" y="340" text-anchor="middle" fill="#e6edf3" font-size="13">catalogue g&#233;ant (GGUF)</text>
    <text x="540" y="385" text-anchor="middle" fill="#3fb950" font-size="12.5" font-weight="600">roi du poste de dev</text>
  </g>

  <!-- Foundry Local card -->
  <g>
    <rect x="760" y="170" width="360" height="250" rx="16" fill="url(#card)" stroke="#38bdf8" stroke-width="2"/>
    <text x="940" y="205" text-anchor="middle" fill="#38bdf8" font-size="17" font-weight="700">FOUNDRY LOCAL</text>
    <text x="940" y="232" text-anchor="middle" fill="#9198a1" font-size="12.5">runtime ONNX ~20 Mo, embarquable</text>
    <rect x="790" y="250" width="300" height="36" rx="8" fill="#12161d" stroke="#30363d" stroke-width="1.5"/>
    <text x="940" y="274" text-anchor="middle" fill="#e6edf3" font-size="13" font-family="Consolas, monospace">GetModelAsync("qwen2.5-7b")</text>
    <!-- chips -->
    <rect x="800" y="300" width="90" height="32" rx="8" fill="#12161d" stroke="#3fb950" stroke-width="1.5"/>
    <text x="845" y="321" text-anchor="middle" fill="#3fb950" font-size="12.5" font-weight="600">NPU</text>
    <rect x="895" y="300" width="90" height="32" rx="8" fill="#12161d" stroke="#3fb950" stroke-width="1.5"/>
    <text x="940" y="321" text-anchor="middle" fill="#3fb950" font-size="12.5" font-weight="600">GPU</text>
    <rect x="990" y="300" width="90" height="32" rx="8" fill="#12161d" stroke="#3fb950" stroke-width="1.5"/>
    <text x="1035" y="321" text-anchor="middle" fill="#3fb950" font-size="12.5" font-weight="600">CPU</text>
    <text x="940" y="358" text-anchor="middle" fill="#e6edf3" font-size="13">s&#233;lection mat&#233;rielle automatique</text>
    <text x="940" y="385" text-anchor="middle" fill="#38bdf8" font-size="12.5" font-weight="600">pens&#233; pour les apps distribu&#233;es</text>
  </g>

  <text x="600" y="470" text-anchor="middle" fill="#ffa657" font-size="14" font-weight="600">la vraie limite : la VRAM &#8212; 7B en Q4 &#8776; 4-5 Go</text>
  <text x="600" y="497" text-anchor="middle" fill="#9198a1" font-size="13">m&#234;me IChatClient, m&#234;me pipeline &#8212; same IChatClient, same pipeline</text>

  <text x="600" y="560" text-anchor="middle" fill="#6e7681" font-size="15" letter-spacing="2">MICROSOFT.EXTENSIONS.AI&#160;EN&#160;PRATIQUE&#160;&#183;&#160;HANDS-ON&#160;WITH&#160;MICROSOFT.EXTENSIONS.AI</text>
</svg>
