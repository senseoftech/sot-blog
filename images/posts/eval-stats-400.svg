<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.16"/>
      <stop offset="55%" stop-color="#38bdf8" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c2430"/>
      <stop offset="100%" stop-color="#12161d"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="#0d1117"/>
  <rect width="1200" height="600" fill="url(#glow)"/>
  <g stroke="#30363d" stroke-opacity="0.18" stroke-width="1">
    <path d="M0 150 H1200 M0 300 H1200 M0 450 H1200"/>
    <path d="M300 0 V600 M600 0 V600 M900 0 V600"/>
  </g>
  <rect x="520" y="30" width="160" height="26" rx="13" fill="#0d1117" stroke="#f85149" stroke-width="2"/>
  <text x="600" y="48" text-anchor="middle" fill="#f85149" font-size="13" letter-spacing="3" font-weight="700">NIVEAU 400</text>
  <text x="600" y="86" text-anchor="middle" fill="#e6edf3" font-size="19" letter-spacing="2" font-weight="600">L'INGÉNIERIE DES ÉVALS · CE QUE « 94 % » VEUT DIRE</text>

  <!-- The illusion vs reality -->
  <g>
    <rect x="80" y="130" width="480" height="180" rx="14" fill="url(#card)" stroke="#ffa657" stroke-width="2"/>
    <text x="320" y="164" text-anchor="middle" fill="#9198a1" font-size="13">47 / 50 cas passent…</text>
    <text x="320" y="212" text-anchor="middle" fill="#e6edf3" font-size="44" font-weight="700">94 %</text>
    <!-- confidence interval bar -->
    <rect x="120" y="240" width="400" height="12" rx="6" fill="#21262d"/>
    <rect x="230" y="240" width="180" height="12" rx="6" fill="#ffa657"/>
    <line x1="320" y1="234" x2="320" y2="258" stroke="#e6edf3" stroke-width="2"/>
    <text x="230" y="284" text-anchor="middle" fill="#9198a1" font-size="12">83 %</text>
    <text x="410" y="284" text-anchor="middle" fill="#9198a1" font-size="12">98 %</text>
    <text x="320" y="302" text-anchor="middle" fill="#f85149" font-size="12.5" font-weight="600">intervalle de confiance à 95 % — énorme sur n=50</text>
  </g>

  <!-- Consequences -->
  <g>
    <rect x="600" y="130" width="540" height="180" rx="14" fill="url(#card)" stroke="#38bdf8" stroke-width="2"/>
    <text x="870" y="162" text-anchor="middle" fill="#38bdf8" font-size="15" font-weight="700">CE QUE ÇA CHANGE</text>
    <g fill="#e6edf3" font-size="13.5">
      <text x="626" y="196">· un score varie (sampling non déterministe) → pass@k</text>
      <text x="626" y="228">· prompt A 94 % vs B 90 % sur 50 cas = du BRUIT</text>
      <text x="626" y="260">· distinguer finement → plusieurs CENTAINES de cas</text>
    </g>
    <text x="870" y="294" text-anchor="middle" fill="#3fb950" font-size="12.5" font-weight="600">affichez l'intervalle, jamais le point seul</text>
  </g>

  <!-- Judge calibration -->
  <g>
    <rect x="80" y="330" width="480" height="150" rx="14" fill="url(#card)" stroke="#bc8cff" stroke-width="2"/>
    <text x="320" y="362" text-anchor="middle" fill="#bc8cff" font-size="15" font-weight="700">CALIBRER LE JUGE (kappa de Cohen)</text>
    <text x="320" y="392" text-anchor="middle" fill="#e6edf3" font-size="13">humain + juge annotent le même échantillon</text>
    <text x="320" y="416" text-anchor="middle" fill="#e6edf3" font-size="13">→ on mesure l'accord, corrigé du hasard</text>
    <text x="320" y="452" text-anchor="middle" fill="#9198a1" font-size="12">kappa faible = générateur de bruit corrélé, pas un instrument</text>
  </g>

  <!-- Contamination & drift -->
  <g>
    <rect x="600" y="330" width="540" height="150" rx="14" fill="url(#card)" stroke="#f85149" stroke-width="2"/>
    <text x="870" y="362" text-anchor="middle" fill="#f85149" font-size="15" font-weight="700">LES DEUX POISONS LENTS</text>
    <g fill="#e6edf3" font-size="13.5">
      <text x="626" y="396">· contamination — cas dans les données d'entraînement</text>
      <text x="646" y="418" fill="#9198a1" font-size="12">→ cas privés, jamais un benchmark public brut</text>
      <text x="626" y="446">· dérive — la prod s'éloigne du dataset figé</text>
      <text x="646" y="468" fill="#9198a1" font-size="12">→ échantillonner la prod, ré-alimenter le dataset</text>
    </g>
  </g>

  <text x="600" y="518" text-anchor="middle" fill="#6e7681" font-size="15" letter-spacing="2">« 94 % » N'EST PAS UN RÉSULTAT, C'EST LE DÉBUT D'UNE PHRASE</text>
</svg>
