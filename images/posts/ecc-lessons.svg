  </g>

  <text x="600" y="62" text-anchor="middle" fill="#38bdf8" font-size="17" letter-spacing="4" font-weight="600">ECC&#160;&#160;&#183;&#160;&#160;&#201;PISODE&#160;&#160;3/3</text>
  <text x="600" y="100" text-anchor="middle" fill="#e6edf3" font-size="30" font-weight="700">Sept le&#231;ons dont s'inspirer &#8212; m&#234;me sans Claude Code</text>

  <!-- 7 lesson cards, 4 + 3 layout -->
  <g>
    <rect x="75" y="165" width="255" height="88" rx="12" fill="url(#card)" stroke="#38bdf8" stroke-width="1.8"/>
    <text x="100" y="200" fill="#38bdf8" font-size="20" font-weight="800">1</text>
    <text x="120" y="200" fill="#e6edf3" font-size="13.5" font-weight="600">&#160;&#201;conomie d'abord</text>
    <text x="202" y="228" text-anchor="middle" fill="#9198a1" font-size="11.5">petit mod&#232;le par d&#233;faut, thinking plafonn&#233;</text>

    <rect x="340" y="165" width="255" height="88" rx="12" fill="url(#card)" stroke="#38bdf8" stroke-width="1.8"/>
    <text x="365" y="200" fill="#38bdf8" font-size="20" font-weight="800">2</text>
    <text x="385" y="200" fill="#e6edf3" font-size="13.5" font-weight="600">&#160;Le drain MCP</text>
    <text x="467" y="228" text-anchor="middle" fill="#9198a1" font-size="11.5">200k &#8594; ~70k &#183; &lt; 10 serveurs, &lt; 80 outils</text>

    <rect x="605" y="165" width="255" height="88" rx="12" fill="url(#card)" stroke="#38bdf8" stroke-width="1.8"/>
    <text x="630" y="200" fill="#38bdf8" font-size="20" font-weight="800">3</text>
    <text x="650" y="200" fill="#e6edf3" font-size="13.5" font-weight="600">&#160;Compacter aux fronti&#232;res</text>
    <text x="732" y="228" text-anchor="middle" fill="#9198a1" font-size="11.5">jamais en pleine impl&#233;mentation</text>

    <rect x="870" y="165" width="255" height="88" rx="12" fill="url(#card)" stroke="#3fb950" stroke-width="1.8"/>
    <text x="895" y="200" fill="#3fb950" font-size="20" font-weight="800">4</text>
    <text x="915" y="200" fill="#e6edf3" font-size="13.5" font-weight="600">&#160;&#171; Fini &#187; = un verdict</text>
    <text x="997" y="228" text-anchor="middle" fill="#9198a1" font-size="11.5">six portes &#183; READY / NOT READY</text>

    <rect x="205" y="273" width="255" height="88" rx="12" fill="url(#card)" stroke="#ffa657" stroke-width="1.8"/>
    <text x="230" y="308" fill="#ffa657" font-size="20" font-weight="800">5</text>
    <text x="250" y="308" fill="#e6edf3" font-size="13.5" font-weight="600">&#160;M&#233;moire sous quota</text>
    <text x="332" y="336" text-anchor="middle" fill="#9198a1" font-size="11.5">8 000 chars &#183; 6 instincts &#183; seuil 0,7</text>

    <rect x="470" y="273" width="255" height="88" rx="12" fill="url(#card)" stroke="#f85149" stroke-width="1.8"/>
    <text x="495" y="308" fill="#f85149" font-size="20" font-weight="800">6</text>
    <text x="515" y="308" fill="#e6edf3" font-size="13.5" font-weight="600">&#160;La config = surface d'attaque</text>
    <text x="597" y="336" text-anchor="middle" fill="#9198a1" font-size="11.5">auditer &#183; canaux v&#233;rifi&#233;s &#183; relire</text>

    <rect x="735" y="273" width="255" height="88" rx="12" fill="url(#card)" stroke="#bc8cff" stroke-width="1.8"/>
    <text x="760" y="308" fill="#bc8cff" font-size="20" font-weight="800">7</text>
    <text x="780" y="308" fill="#e6edf3" font-size="13.5" font-weight="600">&#160;Minimal, puis &#233;laguer</text>
    <text x="862" y="336" text-anchor="middle" fill="#9198a1" font-size="11.5">l'auteur de 278 skills dit : pas toutes !</text>
  </g>

  <!-- transposition strip -->
  <g>
    <rect x="180" y="395" width="840" height="66" rx="14" fill="url(#card)" stroke="#3fb950" stroke-width="2"/>
    <text x="600" y="422" text-anchor="middle" fill="#3fb950" font-size="14" font-weight="700">TRANSPOSABLE : Copilot &#183; Cursor &#183; Codex &#183; votre harnais</text>
    <text x="600" y="446" text-anchor="middle" fill="#9198a1" font-size="12">des le&#231;ons de harnais, pas de produit &#8212; harness lessons, not product lessons</text>
  </g>

  <text x="600" y="497" text-anchor="middle" fill="#9198a1" font-size="13.5">clonez la m&#233;thode (&#233;chec &#8594; r&#232;gle &#8594; skill), pas le contenu en bloc</text>

  <text x="600" y="560" text-anchor="middle" fill="#6e7681" font-size="15" letter-spacing="2">ECC&#160;&#183;&#160;LA&#160;CONFIG&#160;GAGNANTE&#160;&#183;&#160;THE&#160;WINNING&#160;CONFIG&#160;&#8212;&#160;AFFAAN&#160;MUSTAFA</text>
</svg>
