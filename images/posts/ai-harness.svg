<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <radialGradient id="glow" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.18"/>
      <stop offset="55%" stop-color="#38bdf8" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c2430"/>
      <stop offset="100%" stop-color="#12161d"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#38bdf8"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="1200" height="600" fill="#0d1117"/>
  <rect width="1200" height="600" fill="url(#glow)"/>

  <!-- faint grid -->
  <g stroke="#30363d" stroke-opacity="0.18" stroke-width="1">
    <path d="M0 150 H1200 M0 300 H1200 M0 450 H1200"/>
    <path d="M300 0 V600 M600 0 V600 M900 0 V600"/>
  </g>

  <!-- the loop / orbit around the model -->
  <ellipse cx="600" cy="300" rx="250" ry="190" fill="none"
           stroke="#38bdf8" stroke-opacity="0.55" stroke-width="2.5"
           stroke-dasharray="10 9" marker-end="url(#arrow)"/>

  <!-- central model chip -->
  <g>
    <!-- pins -->
    <g stroke="#8b949e" stroke-width="4" stroke-linecap="round">
      <path d="M470 262 h-26 M470 300 h-26 M470 338 h-26"/>
      <path d="M730 262 h26 M730 300 h26 M730 338 h26"/>
    </g>
    <rect x="470" y="232" width="260" height="136" rx="16" fill="url(#chip)" stroke="#38bdf8" stroke-width="2"/>
    <text x="600" y="292" text-anchor="middle" fill="#7dd3fc" font-size="46" font-weight="700" letter-spacing="2">LLM</text>
    <text x="600" y="330" text-anchor="middle" fill="#9198a1" font-size="18" letter-spacing="1">the raw model · le modèle brut</text>
  </g>

  <!-- orbit nodes -->
  <!-- top: context -->
  <g>
    <rect x="510" y="72" width="180" height="56" rx="12" fill="#161b22" stroke="#bc8cff" stroke-width="1.6"/>
    <circle cx="540" cy="100" r="7" fill="#bc8cff"/>
    <text x="562" y="106" fill="#e6edf3" font-size="21" font-weight="600">Context</text>
  </g>
  <!-- right: tools -->
  <g>
    <rect x="905" y="272" width="170" height="56" rx="12" fill="#161b22" stroke="#3fb950" stroke-width="1.6"/>
    <circle cx="935" cy="300" r="7" fill="#3fb950"/>
    <text x="957" y="306" fill="#e6edf3" font-size="21" font-weight="600">Tools</text>
  </g>
  <!-- bottom: guardrails -->
  <g>
    <rect x="500" y="472" width="200" height="56" rx="12" fill="#161b22" stroke="#38bdf8" stroke-width="1.6"/>
    <circle cx="530" cy="500" r="7" fill="#38bdf8"/>
    <text x="552" y="506" fill="#e6edf3" font-size="21" font-weight="600">Guardrails</text>
  </g>
  <!-- left: prompt/rules -->
  <g>
    <rect x="120" y="272" width="180" height="56" rx="12" fill="#161b22" stroke="#ffa657" stroke-width="1.6"/>
    <circle cx="150" cy="300" r="7" fill="#ffa657"/>
    <text x="172" y="306" fill="#e6edf3" font-size="21" font-weight="600">Prompt</text>
  </g>

  <!-- loop label -->
  <text x="600" y="170" text-anchor="middle" fill="#38bdf8" font-size="16" letter-spacing="4" font-weight="600">AGENT LOOP</text>

  <!-- title strip -->
  <text x="600" y="566" text-anchor="middle" fill="#6e7681" font-size="18" letter-spacing="2">
    THE  AI  HARNESS  ·  LE  HARNAIS  DE  L'IA
  </text>
</svg>
