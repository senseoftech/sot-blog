<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.16"/>
      <stop offset="55%" stop-color="#38bdf8" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c2430"/>
      <stop offset="100%" stop-color="#12161d"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="#0d1117"/>
  <rect width="1200" height="600" fill="url(#glow)"/>
  <g stroke="#30363d" stroke-opacity="0.18" stroke-width="1">
    <path d="M0 150 H1200 M0 300 H1200 M0 450 H1200"/>
    <path d="M300 0 V600 M600 0 V600 M900 0 V600"/>
  </g>
  <rect x="520" y="30" width="160" height="26" rx="13" fill="#0d1117" stroke="#f85149" stroke-width="2"/>
  <text x="600" y="48" text-anchor="middle" fill="#f85149" font-size="13" letter-spacing="3" font-weight="700">NIVEAU 400</text>
  <text x="600" y="86" text-anchor="middle" fill="#e6edf3" font-size="19" letter-spacing="2" font-weight="600">L'ÉCONOMIE DE L'INFÉRENCE · VRAM, BATCHING, BASCULE</text>

  <!-- VRAM stack -->
  <g>
    <text x="230" y="128" text-anchor="middle" fill="#9198a1" font-size="14" letter-spacing="1">LA VRAM : LE VRAI GOULOT</text>
    <rect x="110" y="150" width="240" height="90" rx="10" fill="#1c2430" stroke="#38bdf8" stroke-width="2"/>
    <text x="230" y="188" text-anchor="middle" fill="#38bdf8" font-size="15" font-weight="700">poids du modèle</text>
    <text x="230" y="212" text-anchor="middle" fill="#9198a1" font-size="12">coût FIXE (70B ≈ 140 Go / 35 en 4 bits)</text>
    <rect x="110" y="250" width="240" height="130" rx="10" fill="#1c2430" stroke="#ffa657" stroke-width="2"/>
    <text x="230" y="288" text-anchor="middle" fill="#ffa657" font-size="15" font-weight="700">KV cache</text>
    <text x="230" y="312" text-anchor="middle" fill="#9198a1" font-size="12">coût VARIABLE, par token</text>
    <text x="230" y="344" text-anchor="middle" fill="#e6edf3" font-size="12.5">contexte long =</text>
    <text x="230" y="364" text-anchor="middle" fill="#e6edf3" font-size="12.5">mémoire réservée</text>
  </g>

  <!-- Batching -->
  <g>
    <rect x="400" y="150" width="360" height="230" rx="14" fill="url(#card)" stroke="#3fb950" stroke-width="2"/>
    <text x="580" y="182" text-anchor="middle" fill="#3fb950" font-size="15" font-weight="700">CONTINUOUS BATCHING</text>
    <text x="580" y="204" text-anchor="middle" fill="#9198a1" font-size="12">une carte, mille utilisateurs en parallèle</text>
    <g>
      <rect x="430" y="222" width="300" height="16" rx="4" fill="#14432c"/>
      <rect x="430" y="244" width="300" height="16" rx="4" fill="#14432c"/>
      <rect x="430" y="266" width="230" height="16" rx="4" fill="#14432c"/>
      <rect x="430" y="288" width="300" height="16" rx="4" fill="#14432c"/>
    </g>
    <text x="580" y="332" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="600">latence (pour vous) ≠ débit (pour le coût)</text>
    <text x="580" y="356" text-anchor="middle" fill="#f85149" font-size="12.5" font-weight="600">un modèle auto-hébergé n'est rentable que SATURÉ</text>
  </g>

  <!-- Quantization -->
  <g>
    <rect x="810" y="150" width="330" height="230" rx="14" fill="url(#card)" stroke="#bc8cff" stroke-width="2"/>
    <text x="975" y="182" text-anchor="middle" fill="#bc8cff" font-size="15" font-weight="700">QUANTIZATION</text>
    <g font-size="13">
      <text x="836" y="216" fill="#e6edf3">16 bits</text>
      <rect x="920" y="205" width="196" height="14" rx="4" fill="#bc8cff"/>
      <text x="836" y="252" fill="#e6edf3">8 bits</text>
      <rect x="920" y="241" width="98" height="14" rx="4" fill="#bc8cff"/>
      <text x="836" y="288" fill="#e6edf3">4 bits</text>
      <rect x="920" y="277" width="49" height="14" rx="4" fill="#bc8cff"/>
    </g>
    <text x="975" y="326" text-anchor="middle" fill="#9198a1" font-size="12">AWQ/GPTQ : préservent les poids sensibles</text>
    <text x="975" y="352" text-anchor="middle" fill="#e6edf3" font-size="12.5">perte à mesurer sur VOS évals</text>
  </g>

  <!-- Break-even -->
  <g>
    <rect x="150" y="410" width="900" height="70" rx="14" fill="url(#card)" stroke="#38bdf8" stroke-width="2"/>
    <text x="600" y="440" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="700">LA BASCULE : API par défaut (élastique) → auto-hébergé quand débit prouvé + carte saturée</text>
    <text x="600" y="466" text-anchor="middle" fill="#9198a1" font-size="12.5">…ou quand la résidence des données / la latence l'imposent — commencez sur API</text>
  </g>

  <text x="600" y="524" text-anchor="middle" fill="#6e7681" font-size="15" letter-spacing="2">UN GPU EST UN IMMEUBLE : RENTABLE PLEIN, RUINEUX À MOITIÉ VIDE</text>
</svg>
