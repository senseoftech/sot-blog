<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.16"/>
      <stop offset="55%" stop-color="#38bdf8" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c2430"/>
      <stop offset="100%" stop-color="#12161d"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="600" fill="#0d1117"/>
  <rect width="1200" height="600" fill="url(#glow)"/>

  <g stroke="#30363d" stroke-opacity="0.18" stroke-width="1">
    <path d="M0 150 H1200 M0 300 H1200 M0 450 H1200"/>
    <path d="M300 0 V600 M600 0 V600 M900 0 V600"/>
  </g>

  <text x="600" y="60" text-anchor="middle" fill="#38bdf8" font-size="17" letter-spacing="4" font-weight="600">GITHUB&#160;&#160;COPILOT&#160;&#160;CLI&#160;&#160;·&#160;&#160;ÉPISODE&#160;&#160;4/4</text>

  <!-- Local terminal -->
  <g>
    <rect x="80" y="110" width="420" height="180" rx="14" fill="url(#card)" stroke="#3fb950" stroke-width="2"/>
    <text x="290" y="148" text-anchor="middle" fill="#e6edf3" font-size="18" font-weight="700">VOTRE TERMINAL</text>
    <text x="110" y="186" fill="#3fb950" font-size="15" font-family="Consolas, monospace">&gt; &amp; corrige les warnings</text>
    <text x="110" y="212" fill="#9198a1" font-size="13">le &amp; envoie la tâche au cloud —</text>
    <text x="110" y="232" fill="#9198a1" font-size="13">votre terminal est déjà libre</text>
    <text x="110" y="266" fill="#e6edf3" font-size="14" font-family="Consolas, monospace">/worktree · 3 chantiers, 0 conflit</text>
  </g>

  <!-- Cloud -->
  <g>
    <path d="M520 200 H660 l-12 -10 M660 200 l-12 10" stroke="#38bdf8" stroke-width="3" fill="none" stroke-linecap="round"/>
    <rect x="690" y="110" width="420" height="180" rx="14" fill="url(#card)" stroke="#38bdf8" stroke-width="2"/>
    <text x="900" y="148" text-anchor="middle" fill="#e6edf3" font-size="18" font-weight="700">LE CLOUD GITHUB</text>
    <text x="720" y="186" fill="#e6edf3" font-size="14">le coding agent clone, code, teste…</text>
    <text x="720" y="214" fill="#3fb950" font-size="15" font-weight="600">…et ouvre une pull request ✓</text>
    <text x="720" y="248" fill="#9198a1" font-size="13" font-family="Consolas, monospace">copilot --resume : local ⇄ distant</text>
    <text x="720" y="272" fill="#9198a1" font-size="13" font-family="Consolas, monospace">/delegate --base ma-branche</text>
  </g>

  <!-- Scheduling -->
  <g>
    <rect x="80" y="330" width="490" height="180" rx="14" fill="url(#card)" stroke="#ffa657" stroke-width="2"/>
    <text x="325" y="368" text-anchor="middle" fill="#e6edf3" font-size="18" font-weight="700">L'AGENDA DE L'AGENT</text>
    <text x="110" y="406" fill="#ffa657" font-size="14" font-family="Consolas, monospace">/every lundi 9h : audit des dépendances</text>
    <text x="110" y="434" fill="#ffa657" font-size="14" font-family="Consolas, monospace">/after 2h : relance les tests</text>
    <text x="110" y="470" fill="#9198a1" font-size="13">cron, sans la syntaxe cron</text>
  </g>

  <!-- CI -->
  <g>
    <rect x="610" y="330" width="500" height="180" rx="14" fill="url(#card)" stroke="#bc8cff" stroke-width="2"/>
    <text x="860" y="368" text-anchor="middle" fill="#e6edf3" font-size="18" font-weight="700">DANS VOS SCRIPTS &amp; CI</text>
    <text x="640" y="406" fill="#bc8cff" font-size="14" font-family="Consolas, monospace">copilot -p "résume ces logs" --silent</text>
    <text x="640" y="434" fill="#e6edf3" font-size="13" font-family="Consolas, monospace">--available-tools : le périmètre minimal</text>
    <text x="640" y="460" fill="#e6edf3" font-size="13" font-family="Consolas, monospace">--share audit.md : la trace archivée</text>
    <text x="640" y="490" fill="#9198a1" font-size="13">l'agent propose, un humain (ou un test) dispose</text>
  </g>

  <text x="600" y="570" text-anchor="middle" fill="#6e7681" font-size="16" letter-spacing="2">
    DÉLÉGUER  ·  PARALLÉLISER  ·  AUTOMATISER  ·  DELEGATE,  PARALLELIZE,  AUTOMATE
  </text>
</svg>
