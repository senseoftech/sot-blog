<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#3fb950" stop-opacity="0.13"/>
      <stop offset="55%" stop-color="#bc8cff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c2430"/>
      <stop offset="100%" stop-color="#12161d"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="600" fill="#0d1117"/>
  <rect width="1200" height="600" fill="url(#glow)"/>

  <g stroke="#30363d" stroke-opacity="0.18" stroke-width="1">
    <path d="M0 150 H1200 M0 300 H1200 M0 450 H1200"/>
    <path d="M300 0 V600 M600 0 V600 M900 0 V600"/>
  </g>

  <text x="600" y="62" text-anchor="middle" fill="#38bdf8" font-size="17" letter-spacing="4" font-weight="600">AGENTIC&#160;&#160;SDLC&#160;&#160;&#183;&#160;&#160;&#201;PISODE&#160;&#160;6/9</text>
  <text x="600" y="100" text-anchor="middle" fill="#e6edf3" font-size="30" font-weight="700">L'agent propose, la porte dispose</text>

  <!-- Probabilistic side -->
  <g>
    <rect x="80" y="170" width="380" height="280" rx="16" fill="url(#card)" stroke="#bc8cff" stroke-width="2"/>
    <text x="270" y="210" text-anchor="middle" fill="#bc8cff" font-size="17" font-weight="700">C&#212;T&#201; PROBABILISTE</text>
    <text x="270" y="245" text-anchor="middle" fill="#e6edf3" font-size="13.5">lire &#183; r&#233;diger &#183; proposer</text>
    <!-- cloud -->
    <path d="M190 320 q-30 0 -30 -25 q0 -25 28 -25 q6 -28 38 -28 q30 0 38 24 q30 -2 34 22 q4 27 -26 32 Z" fill="#12161d" stroke="#bc8cff" stroke-width="2"/>
    <text x="235" y="303" text-anchor="middle" fill="#bc8cff" font-size="13" font-weight="600">mod&#232;le</text>
    <text x="270" y="375" text-anchor="middle" fill="#9198a1" font-size="12.5">m&#234;mes entr&#233;es &#8594; sorties similaires</text>
    <text x="270" y="400" text-anchor="middle" fill="#f85149" font-size="12.5" font-weight="600">&#233;checs silencieux : plausible et faux</text>
    <!-- proposal artifact -->
    <rect x="330" y="270" width="100" height="64" rx="8" fill="#12161d" stroke="#ffa657" stroke-width="2"/>
    <text x="380" y="297" text-anchor="middle" fill="#ffa657" font-size="12.5" font-weight="600">proposition</text>
    <text x="380" y="317" text-anchor="middle" fill="#9198a1" font-size="11.5">JSON &#183; diff &#183; plan</text>
  </g>

  <!-- Gate -->
  <g>
    <path d="M460 302 H540" stroke="#ffa657" stroke-width="2.5" fill="none"/>
    <path d="M532 296 L544 302 L532 308 Z" fill="#ffa657"/>
    <rect x="548" y="220" width="104" height="170" rx="14" fill="url(#card)" stroke="#f85149" stroke-width="2.5"/>
    <text x="600" y="258" text-anchor="middle" fill="#f85149" font-size="16" font-weight="800">LA PORTE</text>
    <text x="600" y="288" text-anchor="middle" fill="#e6edf3" font-size="12">sch&#233;ma</text>
    <text x="600" y="308" text-anchor="middle" fill="#e6edf3" font-size="12">allowlist</text>
    <text x="600" y="328" text-anchor="middle" fill="#e6edf3" font-size="12">tests</text>
    <text x="600" y="348" text-anchor="middle" fill="#e6edf3" font-size="12">humain</text>
    <text x="600" y="375" text-anchor="middle" fill="#9198a1" font-size="11">d&#233;terministe</text>
    <path d="M656 302 H736" stroke="#3fb950" stroke-width="2.5" fill="none"/>
    <path d="M728 296 L740 302 L728 308 Z" fill="#3fb950"/>
  </g>

  <!-- Deterministic side -->
  <g>
    <rect x="744" y="170" width="380" height="280" rx="16" fill="url(#card)" stroke="#3fb950" stroke-width="2"/>
    <text x="934" y="210" text-anchor="middle" fill="#3fb950" font-size="17" font-weight="700">C&#212;T&#201; D&#201;TERMINISTE</text>
    <text x="934" y="245" text-anchor="middle" fill="#e6edf3" font-size="13.5">appliquer &#183; d&#233;ployer &#183; &#233;crire</text>
    <rect x="800" y="270" width="270" height="34" rx="8" fill="#12161d" stroke="#3fb950" stroke-width="1.5"/>
    <text x="935" y="292" text-anchor="middle" fill="#e6edf3" font-size="12.5" font-family="Consolas, monospace">validate(schema) &#8594; apply()</text>
    <rect x="800" y="316" width="270" height="34" rx="8" fill="#12161d" stroke="#3fb950" stroke-width="1.5"/>
    <text x="935" y="338" text-anchor="middle" fill="#e6edf3" font-size="12.5" font-family="Consolas, monospace">audit trail : complet</text>
    <text x="934" y="382" text-anchor="middle" fill="#9198a1" font-size="12.5">m&#234;mes entr&#233;es &#8594; m&#234;mes sorties</text>
    <text x="934" y="406" text-anchor="middle" fill="#3fb950" font-size="12.5" font-weight="600">l'irr&#233;versible vit ici, jamais avant la porte</text>
  </g>

  <text x="600" y="497" text-anchor="middle" fill="#9198a1" font-size="13.5">l'agent ne d&#233;tient jamais le droit d'&#233;criture d'une action irr&#233;versible</text>

  <text x="600" y="560" text-anchor="middle" fill="#6e7681" font-size="15" letter-spacing="2">
    L'AGENTIC&#160;SDLC&#160;&#183;&#160;THE&#160;AGENTIC&#160;SDLC&#160;&#8212;&#160;D'APR&#200;S&#160;/&#160;AFTER&#160;DANIEL&#160;MEPPIEL
  </text>
</svg>
