<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.16"/>
      <stop offset="55%" stop-color="#38bdf8" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c2430"/>
      <stop offset="100%" stop-color="#12161d"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="#0d1117"/>
  <rect width="1200" height="600" fill="url(#glow)"/>
  <g stroke="#30363d" stroke-opacity="0.18" stroke-width="1">
    <path d="M0 150 H1200 M0 300 H1200 M0 450 H1200"/>
    <path d="M300 0 V600 M600 0 V600 M900 0 V600"/>
  </g>
  <text x="600" y="60" text-anchor="middle" fill="#38bdf8" font-size="17" letter-spacing="4" font-weight="600">OBSERVER&#160;&#160;SES&#160;&#160;AGENTS&#160;&#160;·&#160;&#160;OPENTELEMETRY</text>

  <!-- Trace timeline (gantt) -->
  <g>
    <rect x="80" y="110" width="1040" height="330" rx="16" fill="url(#card)" stroke="#38bdf8" stroke-width="2"/>
    <text x="110" y="146" fill="#e6edf3" font-size="15" font-weight="700">la timeline d'une requête — le film, span par span</text>

    <!-- invoke_agent -->
    <rect x="130" y="170" width="940" height="34" rx="6" fill="#1c3a5e"/>
    <text x="146" y="192" fill="#38bdf8" font-size="13" font-family="Consolas, monospace">invoke_agent · ExpenseAgent · 12,4 s</text>

    <!-- chat 1 -->
    <rect x="170" y="216" width="220" height="30" rx="6" fill="#3b2a5e"/>
    <text x="184" y="236" fill="#bc8cff" font-size="12" font-family="Consolas, monospace">chat · in 8 214 tk · out 312</text>

    <!-- tool 1 -->
    <rect x="400" y="258" width="160" height="30" rx="6" fill="#14432c"/>
    <text x="414" y="278" fill="#3fb950" font-size="12" font-family="Consolas, monospace">execute_tool · GetStock</text>

    <!-- chat 2 -->
    <rect x="570" y="216" width="180" height="30" rx="6" fill="#3b2a5e"/>
    <text x="584" y="236" fill="#bc8cff" font-size="12" font-family="Consolas, monospace">chat · in 9 021 tk</text>

    <!-- tool 2 (error) -->
    <rect x="760" y="258" width="180" height="30" rx="6" fill="#4d1f24"/>
    <text x="774" y="278" fill="#f85149" font-size="12" font-family="Consolas, monospace">execute_tool · ✗ error</text>

    <!-- chat 3 -->
    <rect x="950" y="216" width="110" height="30" rx="6" fill="#3b2a5e"/>
    <text x="962" y="236" fill="#bc8cff" font-size="12" font-family="Consolas, monospace">chat · fin</text>

    <text x="130" y="330" fill="#9198a1" font-size="13">ce qu'on y lit sans deviner :</text>
    <g fill="#e6edf3" font-size="13">
      <text x="150" y="358">· la boucle d'outils silencieuse (8 appels identiques)</text>
      <text x="150" y="384">· le contexte qui enfle tour après tour (la dilution, mesurée)</text>
      <text x="150" y="410">· le taux de cache qui s'effondre après une compaction</text>
    </g>
    <g fill="#9198a1" font-size="12">
      <text x="700" y="358">conventions GenAI : invoke_agent · chat · execute_tool</text>
      <text x="700" y="384">contenu des prompts : opt-in explicite, à gouverner</text>
      <text x="700" y="410">l'incident de cette nuit → l'éval de demain</text>
    </g>
  </g>

  <!-- Aspire dashboard -->
  <g>
    <rect x="270" y="470" width="660" height="60" rx="12" fill="url(#card)" stroke="#bc8cff" stroke-width="2"/>
    <text x="600" y="495" text-anchor="middle" fill="#bc8cff" font-size="14" font-weight="700">la salle de projection locale : le dashboard Aspire (un conteneur, gratuit)</text>
    <text x="600" y="518" text-anchor="middle" fill="#9198a1" font-size="12" font-family="Consolas, monospace">docker run … aspire-dashboard → localhost:18888</text>
  </g>

  <text x="600" y="568" text-anchor="middle" fill="#6e7681" font-size="16" letter-spacing="2">
    REJOUER  LE  FILM  ·  REPLAY  THE  TAPE
  </text>
</svg>
