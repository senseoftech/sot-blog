  <text x="600" y="497" text-anchor="middle" fill="#ffa657" font-size="14" font-weight="600">comme REST : les contraintes induisent les propri&#233;t&#233;s &#8212; constraints induce properties</text>

  <text x="600" y="560" text-anchor="middle" fill="#6e7681" font-size="15" letter-spacing="2">
