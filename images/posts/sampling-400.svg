<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.16"/>
      <stop offset="55%" stop-color="#38bdf8" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c2430"/>
      <stop offset="100%" stop-color="#12161d"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="#0d1117"/>
  <rect width="1200" height="600" fill="url(#glow)"/>
  <g stroke="#30363d" stroke-opacity="0.18" stroke-width="1">
    <path d="M0 150 H1200 M0 300 H1200 M0 450 H1200"/>
    <path d="M300 0 V600 M600 0 V600 M900 0 V600"/>
  </g>
  <rect x="520" y="30" width="160" height="26" rx="13" fill="#0d1117" stroke="#f85149" stroke-width="2"/>
  <text x="600" y="48" text-anchor="middle" fill="#f85149" font-size="13" letter-spacing="3" font-weight="700">NIVEAU 400</text>
  <text x="600" y="86" text-anchor="middle" fill="#e6edf3" font-size="19" letter-spacing="2" font-weight="600">SAMPLING · TEMPERATURE, TOP-P ET DÉCODAGE CONTRAINT</text>

  <!-- Distribution low temp -->
  <g>
    <text x="230" y="128" text-anchor="middle" fill="#9198a1" font-size="13">température BASSE — courbe piquée</text>
    <g fill="#3fb950">
      <rect x="120" y="150" width="34" height="90" rx="3"/>
      <rect x="160" y="220" width="34" height="20" rx="3" fill-opacity="0.5"/>
      <rect x="200" y="228" width="34" height="12" rx="3" fill-opacity="0.5"/>
      <rect x="240" y="232" width="34" height="8" rx="3" fill-opacity="0.5"/>
      <rect x="280" y="234" width="34" height="6" rx="3" fill-opacity="0.5"/>
    </g>
    <text x="137" y="258" text-anchor="middle" fill="#3fb950" font-size="11">Paris</text>
    <text x="230" y="278" text-anchor="middle" fill="#9198a1" font-size="11">prévisible · factuel · code</text>
  </g>
  <!-- Distribution high temp -->
  <g>
    <text x="500" y="128" text-anchor="middle" fill="#9198a1" font-size="13">température HAUTE — courbe aplatie</text>
    <g fill="#ffa657">
      <rect x="390" y="180" width="34" height="60" rx="3"/>
      <rect x="430" y="196" width="34" height="44" rx="3"/>
      <rect x="470" y="204" width="34" height="36" rx="3"/>
      <rect x="510" y="210" width="34" height="30" rx="3"/>
      <rect x="550" y="216" width="34" height="24" rx="3"/>
    </g>
    <text x="500" y="278" text-anchor="middle" fill="#9198a1" font-size="11">créatif · divers · aventureux</text>
  </g>

  <!-- Filters -->
  <g>
    <rect x="640" y="140" width="500" height="150" rx="14" fill="url(#card)" stroke="#38bdf8" stroke-width="2"/>
    <text x="890" y="170" text-anchor="middle" fill="#38bdf8" font-size="15" font-weight="700">COUPER LA TRAÎNE</text>
    <g fill="#e6edf3" font-size="13">
      <text x="666" y="200">top-k — les k meilleurs candidats</text>
      <text x="666" y="228">top-p — le plus petit groupe qui pèse p %  ← défaut</text>
      <text x="666" y="256">min-p — rien sous X % du favori</text>
    </g>
    <text x="890" y="280" text-anchor="middle" fill="#9198a1" font-size="11.5">le modèle propose la distribution · le sampler tranche</text>
  </g>

  <!-- Temp 0 bomb -->
  <g>
    <rect x="70" y="320" width="520" height="150" rx="14" fill="url(#card)" stroke="#f85149" stroke-width="2"/>
    <text x="330" y="352" text-anchor="middle" fill="#f85149" font-size="16" font-weight="700">⚠ TEMPÉRATURE 0 ≠ DÉTERMINISTE</text>
    <g fill="#e6edf3" font-size="13">
      <text x="96" y="386">· flottants non associatifs sur GPU : (a+b)+c ≠ a+(b+c)</text>
      <text x="96" y="414">· batching variable : dépend de qui appelle en même temps</text>
    </g>
    <text x="330" y="448" text-anchor="middle" fill="#3fb950" font-size="12.5" font-weight="600">→ on bâtit sur des SEUILS (évals), jamais sur la reproductibilité</text>
  </g>

  <!-- Constrained decoding -->
  <g>
    <rect x="620" y="320" width="520" height="150" rx="14" fill="url(#card)" stroke="#3fb950" stroke-width="2"/>
    <text x="880" y="352" text-anchor="middle" fill="#3fb950" font-size="16" font-weight="700">DÉCODAGE CONTRAINT</text>
    <text x="880" y="380" text-anchor="middle" fill="#e6edf3" font-size="13">on masque les logits hors-grammaire à chaque token</text>
    <g font-family="Consolas, monospace" font-size="12">
      <rect x="700" y="396" width="70" height="30" rx="5" fill="#14432c" stroke="#3fb950"/>
      <text x="735" y="416" text-anchor="middle" fill="#3fb950">{ ✓</text>
      <rect x="780" y="396" width="90" height="30" rx="5" fill="#4d1f24" stroke="#f85149"/>
      <text x="825" y="416" text-anchor="middle" fill="#f85149">"the" ✗</text>
      <rect x="880" y="396" width="90" height="30" rx="5" fill="#4d1f24" stroke="#f85149"/>
      <text x="925" y="416" text-anchor="middle" fill="#f85149">42 ✗</text>
    </g>
    <text x="880" y="452" text-anchor="middle" fill="#9198a1" font-size="12">JSON valide PAR CONSTRUCTION — la forme, jamais le fond</text>
  </g>

  <text x="600" y="510" text-anchor="middle" fill="#6e7681" font-size="15" letter-spacing="2">LE HASARD EST UN PARAMÈTRE, PAS UNE FATALITÉ</text>
</svg>
