    <circle cx="958" cy="365" r="9" fill="#3fb950"/>
    <text x="958" y="369" text-anchor="middle" fill="#0d1117" font-size="11" font-weight="700">2</text>
    <text x="974" y="370" fill="#e6edf3" font-size="13">api-reference.md</text>

    <rect x="936" y="404" width="196" height="38" rx="10" fill="url(#card)" stroke="#30363d" stroke-width="1.5"/>
    <circle cx="958" cy="423" r="9" fill="#3fb950"/>
    <text x="958" y="427" text-anchor="middle" fill="#0d1117" font-size="11" font-weight="700">3</text>
