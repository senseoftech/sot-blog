<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.16"/>
      <stop offset="55%" stop-color="#38bdf8" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c2430"/>
      <stop offset="100%" stop-color="#12161d"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="600" fill="#0d1117"/>
  <rect width="1200" height="600" fill="url(#glow)"/>

  <g stroke="#30363d" stroke-opacity="0.18" stroke-width="1">
    <path d="M0 150 H1200 M0 300 H1200 M0 450 H1200"/>
    <path d="M300 0 V600 M600 0 V600 M900 0 V600"/>
  </g>

  <text x="600" y="62" text-anchor="middle" fill="#38bdf8" font-size="17" letter-spacing="4" font-weight="600">VIBE&#160;&#160;CODING&#160;&#160;·&#160;&#160;LES&#160;&#160;ARTEFACTS&#160;&#160;DU&#160;&#160;D&#201;P&#212;T</text>

  <!-- Left: the repo tree of artifacts -->
  <g>
    <rect x="70" y="110" width="400" height="390" rx="16" fill="url(#card)" stroke="#38bdf8" stroke-width="2"/>
    <text x="100" y="150" fill="#e6edf3" font-size="19" font-weight="700">mon-projet/</text>

    <text x="120" y="188" fill="#9198a1" font-size="15">src/</text>
    <text x="230" y="188" fill="#6e7681" font-size="12">le code — regénérable</text>

    <text x="120" y="222" fill="#3fb950" font-size="15" font-weight="600">AGENTS.md</text>
    <text x="120" y="252" fill="#3fb950" font-size="15" font-weight="600">docs/adr/</text>
    <text x="120" y="282" fill="#3fb950" font-size="15" font-weight="600">docs/glossaire.md</text>
    <text x="120" y="312" fill="#3fb950" font-size="15" font-weight="600">docs/specs/</text>
    <text x="120" y="342" fill="#3fb950" font-size="15" font-weight="600">docs/runbooks/</text>
    <text x="120" y="372" fill="#3fb950" font-size="15" font-weight="600">tests/</text>
    <text x="120" y="402" fill="#3fb950" font-size="15" font-weight="600">.editorconfig</text>
    <text x="120" y="432" fill="#3fb950" font-size="15" font-weight="600">openapi.yaml</text>

    <text x="100" y="472" fill="#ffa657" font-size="13" font-weight="600">le capital — versionné, relu en PR</text>
  </g>

  <!-- Arrows from repo to agent -->
  <g stroke="#38bdf8" stroke-width="2" fill="none" stroke-dasharray="6 5">
    <path d="M480 220 Q580 220 660 265"/>
    <path d="M480 310 Q570 310 660 300"/>
    <path d="M480 400 Q580 400 660 335"/>
  </g>
  <text x="575" y="200" text-anchor="middle" fill="#9198a1" font-size="13">contexte</text>

  <!-- Right: the agent that knows -->
  <g>
    <rect x="670" y="200" width="200" height="200" rx="16" fill="url(#card)" stroke="#bc8cff" stroke-width="2"/>
    <circle cx="770" cy="270" r="34" fill="#12161d" stroke="#bc8cff" stroke-width="2"/>
    <circle cx="757" cy="264" r="5" fill="#bc8cff"/>
    <circle cx="783" cy="264" r="5" fill="#bc8cff"/>
    <path d="M755 288 Q770 298 785 288" stroke="#bc8cff" stroke-width="2.5" fill="none"/>
    <text x="770" y="340" text-anchor="middle" fill="#e6edf3" font-size="16" font-weight="600">agent IA</text>
    <text x="770" y="366" text-anchor="middle" fill="#3fb950" font-size="13" font-weight="600">il ne devine pas : il sait</text>
  </g>

  <!-- The recurring formula -->
  <g>
    <rect x="905" y="200" width="230" height="200" rx="16" fill="url(#card)" stroke="#30363d" stroke-width="1.5"/>
    <text x="1020" y="245" text-anchor="middle" fill="#38bdf8" font-size="14" font-weight="600" letter-spacing="1">LE&#160;MOTIF</text>
    <text x="1020" y="285" text-anchor="middle" fill="#e6edf3" font-size="15">l'IA propose</text>
    <text x="1020" y="315" text-anchor="middle" fill="#e6edf3" font-size="15">l'humain tranche</text>
    <text x="1020" y="345" text-anchor="middle" fill="#e6edf3" font-size="15">le dépôt mémorise</text>
    <text x="1020" y="380" text-anchor="middle" fill="#9198a1" font-size="12">× 13 artefacts</text>
  </g>

  <text x="600" y="548" text-anchor="middle" fill="#6e7681" font-size="16" letter-spacing="2">
    LE  D&#201;P&#212;T  QUI  PARLE  ·  THE  REPO  THAT  TALKS
  </text>
