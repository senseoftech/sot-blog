<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.16"/>
      <stop offset="55%" stop-color="#38bdf8" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c2430"/>
      <stop offset="100%" stop-color="#12161d"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="600" fill="#0d1117"/>
  <rect width="1200" height="600" fill="url(#glow)"/>

  <g stroke="#30363d" stroke-opacity="0.18" stroke-width="1">
    <path d="M0 150 H1200 M0 300 H1200 M0 450 H1200"/>
    <path d="M300 0 V600 M600 0 V600 M900 0 V600"/>
  </g>

  <text x="600" y="62" text-anchor="middle" fill="#38bdf8" font-size="17" letter-spacing="4" font-weight="600">GIT&#160;&#160;LOG&#160;&#160;·&#160;&#160;CONVENTIONAL&#160;&#160;COMMITS</text>

  <!-- Left: noise -->
  <g>
    <text x="270" y="140" text-anchor="middle" fill="#f85149" font-size="14" letter-spacing="1">DU BRUIT</text>
    <g font-family="Consolas, monospace" font-size="15">
      <circle cx="110" cy="185" r="7" fill="#6e7681"/>
      <text x="140" y="191" fill="#9198a1">a3f21c  fix</text>
      <circle cx="110" cy="235" r="7" fill="#6e7681"/>
      <text x="140" y="241" fill="#9198a1">b7e90d  wip</text>
      <circle cx="110" cy="285" r="7" fill="#6e7681"/>
      <text x="140" y="291" fill="#9198a1">c1d45a  update</text>
      <circle cx="110" cy="335" r="7" fill="#6e7681"/>
      <text x="140" y="341" fill="#9198a1">d9a77e  fix2</text>
    </g>
    <path d="M110 185 V335" stroke="#30363d" stroke-width="2"/>
    <text x="250" y="400" text-anchor="middle" fill="#9198a1" font-size="14" font-style="italic">« git blame » tombe sur une énigme</text>
  </g>

  <!-- Arrow -->
  <g>
    <path d="M500 280 H570" stroke="#38bdf8" stroke-width="3" fill="none"/>
    <path d="M570 280 l-14 -9 v18 z" fill="#38bdf8"/>
  </g>

  <!-- Right: memories -->
  <g>
    <rect x="610" y="120" width="500" height="350" rx="16" fill="url(#card)" stroke="#3fb950" stroke-width="2"/>
    <text x="860" y="158" text-anchor="middle" fill="#e6edf3" font-size="17" font-weight="600">des souvenirs, pas du bruit</text>

    <path d="M660 200 V420" stroke="#30363d" stroke-width="2"/>
    <g font-family="Consolas, monospace" font-size="14">
      <circle cx="660" cy="205" r="7" fill="#3fb950"/>
      <rect x="686" y="192" width="46" height="24" rx="12" fill="#12161d" stroke="#3fb950" stroke-width="1.5"/>
      <text x="709" y="209" text-anchor="middle" fill="#3fb950" font-size="12">feat</text>
      <text x="744" y="209" fill="#e6edf3">(catalog): filtre par gamme de prix</text>

      <circle cx="660" cy="270" r="7" fill="#ffa657"/>
      <rect x="686" y="257" width="40" height="24" rx="12" fill="#12161d" stroke="#ffa657" stroke-width="1.5"/>
      <text x="706" y="274" text-anchor="middle" fill="#ffa657" font-size="12">fix</text>
      <text x="738" y="274" fill="#e6edf3">(order): arrondir la TVA (#412)</text>
      <text x="686" y="298" fill="#9198a1" font-size="12">le fournisseur arrondit par ligne, nous par commande</text>

      <circle cx="660" cy="345" r="7" fill="#bc8cff"/>
      <rect x="686" y="332" width="90" height="24" rx="12" fill="#12161d" stroke="#bc8cff" stroke-width="1.5"/>
      <text x="731" y="349" text-anchor="middle" fill="#bc8cff" font-size="12">refactor</text>
      <text x="788" y="349" fill="#e6edf3">(shipping): extraire le calcul</text>
      <text x="686" y="373" fill="#9198a1" font-size="12">le comportement ne change pas</text>
    </g>

    <text x="860" y="438" text-anchor="middle" fill="#9198a1" font-size="13">un commit = un changement · le corps porte le pourquoi</text>
  </g>

  <text x="600" y="548" text-anchor="middle" fill="#6e7681" font-size="16" letter-spacing="2">
    LA  MÉMOIRE  QUE  L'IA  LIT  DÉJÀ  ·  THE  MEMORY  AI  ALREADY  READS
  </text>
</svg>
