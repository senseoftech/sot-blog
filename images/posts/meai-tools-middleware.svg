<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#bc8cff" stop-opacity="0.15"/>
      <stop offset="55%" stop-color="#bc8cff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c2430"/>
      <stop offset="100%" stop-color="#12161d"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="600" fill="#0d1117"/>
  <rect width="1200" height="600" fill="url(#glow)"/>

  <g stroke="#30363d" stroke-opacity="0.18" stroke-width="1">
    <path d="M0 150 H1200 M0 300 H1200 M0 450 H1200"/>
    <path d="M300 0 V600 M600 0 V600 M900 0 V600"/>
  </g>

  <text x="600" y="62" text-anchor="middle" fill="#38bdf8" font-size="17" letter-spacing="4" font-weight="600">MICROSOFT.EXTENSIONS.AI&#160;&#160;&#183;&#160;&#160;&#201;PISODE&#160;&#160;2/5</text>
  <text x="600" y="100" text-anchor="middle" fill="#e6edf3" font-size="30" font-weight="700">Outils, sorties typ&#233;es et middlewares</text>

  <!-- left: method to tool -->
  <g>
    <rect x="80" y="180" width="320" height="130" rx="14" fill="url(#card)" stroke="#3fb950" stroke-width="2"/>
    <text x="240" y="212" text-anchor="middle" fill="#3fb950" font-size="14" font-weight="700">VOTRE M&#201;THODE .NET</text>
    <text x="240" y="245" text-anchor="middle" fill="#e6edf3" font-size="14" font-family="Consolas, monospace">Task&lt;StockInfo&gt; GetStock(sku)</text>
    <text x="240" y="280" text-anchor="middle" fill="#9198a1" font-size="12.5" font-family="Consolas, monospace">AIFunctionFactory.Create(...)</text>
  </g>

  <path d="M240 310 V350" stroke="#3fb950" stroke-width="2"/>
  <path d="M234 342 L240 354 L246 342 Z" fill="#3fb950"/>

  <g>
    <rect x="80" y="358" width="320" height="100" rx="14" fill="url(#card)" stroke="#3fb950" stroke-width="2"/>
    <text x="240" y="390" text-anchor="middle" fill="#e6edf3" font-size="13.5">sch&#233;ma JSON g&#233;n&#233;r&#233;, boucle g&#233;r&#233;e</text>
    <text x="240" y="420" text-anchor="middle" fill="#3fb950" font-size="14" font-weight="600" font-family="Consolas, monospace">.UseFunctionInvocation()</text>
    <text x="240" y="443" text-anchor="middle" fill="#9198a1" font-size="12">+ outils MCP dans la m&#234;me liste</text>
  </g>

  <!-- middle: typed output -->
  <g>
    <rect x="440" y="180" width="320" height="278" rx="14" fill="url(#card)" stroke="#bc8cff" stroke-width="2"/>
    <text x="600" y="212" text-anchor="middle" fill="#bc8cff" font-size="14" font-weight="700">SORTIES TYP&#201;ES</text>
    <text x="600" y="250" text-anchor="middle" fill="#e6edf3" font-size="14" font-family="Consolas, monospace">GetResponseAsync&lt;T&gt;()</text>
    <rect x="470" y="272" width="260" height="120" rx="10" fill="#12161d" stroke="#30363d" stroke-width="1.5"/>
    <text x="600" y="300" text-anchor="middle" fill="#9198a1" font-size="12.5" font-family="Consolas, monospace">record TicketTriage(</text>
    <text x="600" y="322" text-anchor="middle" fill="#9198a1" font-size="12.5" font-family="Consolas, monospace">  string Categorie,</text>
    <text x="600" y="344" text-anchor="middle" fill="#9198a1" font-size="12.5" font-family="Consolas, monospace">  int Priorite, ...)</text>
    <text x="600" y="376" text-anchor="middle" fill="#bc8cff" font-size="12.5" font-family="Consolas, monospace">result.Result  // typ&#233;</text>
    <text x="600" y="428" text-anchor="middle" fill="#9198a1" font-size="12">sch&#233;ma impos&#233;, d&#233;s&#233;rialisation incluse</text>
  </g>

  <!-- right: middleware stack -->
  <g>
    <rect x="800" y="180" width="320" height="278" rx="14" fill="url(#card)" stroke="#38bdf8" stroke-width="2"/>
    <text x="960" y="212" text-anchor="middle" fill="#38bdf8" font-size="14" font-weight="700">LE PIPELINE</text>
    <rect x="830" y="232" width="260" height="40" rx="8" fill="#12161d" stroke="#30363d" stroke-width="1.5"/>
    <text x="960" y="258" text-anchor="middle" fill="#e6edf3" font-size="13" font-family="Consolas, monospace">UseDistributedCache</text>
    <rect x="830" y="282" width="260" height="40" rx="8" fill="#12161d" stroke="#30363d" stroke-width="1.5"/>
    <text x="960" y="308" text-anchor="middle" fill="#e6edf3" font-size="13" font-family="Consolas, monospace">UseFunctionInvocation</text>
    <rect x="830" y="332" width="260" height="40" rx="8" fill="#12161d" stroke="#30363d" stroke-width="1.5"/>
    <text x="960" y="358" text-anchor="middle" fill="#e6edf3" font-size="13" font-family="Consolas, monospace">UseOpenTelemetry</text>
    <rect x="830" y="382" width="260" height="40" rx="8" fill="#12161d" stroke="#ffa657" stroke-width="1.5"/>
    <text x="960" y="408" text-anchor="middle" fill="#ffa657" font-size="13" font-family="Consolas, monospace">UseVotreMiddleware()</text>
    <text x="960" y="443" text-anchor="middle" fill="#9198a1" font-size="12">l'ordre compte</text>
  </g>

  <text x="600" y="497" text-anchor="middle" fill="#9198a1" font-size="13.5">un outil expos&#233; au mod&#232;le est une surface d'attaque &#8212; validez les arguments</text>

  <text x="600" y="560" text-anchor="middle" fill="#6e7681" font-size="15" letter-spacing="2">MICROSOFT.EXTENSIONS.AI&#160;EN&#160;PRATIQUE&#160;&#183;&#160;HANDS-ON&#160;WITH&#160;MICROSOFT.EXTENSIONS.AI</text>
</svg>
