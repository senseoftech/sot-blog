    <text x="110" y="370" fill="#3fb950" font-size="13">+ analyzer CA2000 en erreur — Sarah, 28/03</text>
    <text x="110" y="390" fill="#3fb950" font-size="13">+ test de régression sur le pool — Marc, 21/03</text>
    <text x="110" y="410" fill="#3fb950" font-size="13">+ runbook « API 503 » mis à jour — Ana, 18/03</text>

