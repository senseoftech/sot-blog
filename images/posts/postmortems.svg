    <rect x="620" y="240" width="180" height="56" rx="14" fill="#12161d" stroke="#f85149" stroke-width="2"/>
    <text x="710" y="262" text-anchor="middle" fill="#f85149" font-size="14" font-weight="700">INCIDENT</text>
    <text x="710" y="282" text-anchor="middle" fill="#9198a1" font-size="12">03:07 — SEV 2</text>

    <path d="M800 268 H880" stroke="#9198a1" stroke-width="2" fill="none"/>
    <path d="M880 268 l-8 -5 v10 z" fill="#9198a1"/>

