      <rect x="800" y="350" width="140" height="44" rx="12" fill="url(#card)" stroke="#3fb950" stroke-width="1.5"/>
      <text x="870" y="377" text-anchor="middle" fill="#3fb950" font-size="13" font-weight="600">test de rég.</text>
      <rect x="960" y="350" width="140" height="44" rx="12" fill="url(#card)" stroke="#3fb950" stroke-width="1.5"/>
      <text x="1030" y="377" text-anchor="middle" fill="#3fb950" font-size="13" font-weight="600">ADR</text>
    </g>
    <path d="M990 340 Q990 345 870 350 M990 340 Q900 345 720 350" stroke="#3fb950" stroke-width="1.5" fill="none" stroke-opacity="0.6"/>

    <text x="870" y="432" text-anchor="middle" fill="#9198a1" font-size="13">un postmortem utile modifie le dépôt</text>
    <text x="870" y="458" text-anchor="middle" fill="#9198a1" font-size="13">l'IA compile la chronologie · l'humain tranche la cause</text>
