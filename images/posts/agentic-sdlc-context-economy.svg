<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.16"/>
      <stop offset="55%" stop-color="#38bdf8" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c2430"/>
      <stop offset="100%" stop-color="#12161d"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="600" fill="#0d1117"/>
  <rect width="1200" height="600" fill="url(#glow)"/>

  <g stroke="#30363d" stroke-opacity="0.18" stroke-width="1">
    <path d="M0 150 H1200 M0 300 H1200 M0 450 H1200"/>
    <path d="M300 0 V600 M600 0 V600 M900 0 V600"/>
  </g>

  <text x="600" y="62" text-anchor="middle" fill="#38bdf8" font-size="17" letter-spacing="4" font-weight="600">AGENTIC&#160;&#160;SDLC&#160;&#160;&#183;&#160;&#160;&#201;PISODE&#160;&#160;5/9</text>
  <text x="600" y="100" text-anchor="middle" fill="#e6edf3" font-size="30" font-weight="700">L'&#233;conomie de l'attention : la fen&#234;tre n'est pas le focus</text>

  <!-- U curve chart -->
  <g>
    <rect x="130" y="150" width="940" height="310" rx="16" fill="url(#card)" stroke="#30363d" stroke-width="1.5"/>

    <!-- axes -->
    <path d="M190 420 H1010" stroke="#6e7681" stroke-width="1.5"/>
    <path d="M190 420 V190" stroke="#6e7681" stroke-width="1.5"/>
    <text x="185" y="180" fill="#9198a1" font-size="12" text-anchor="middle">attention</text>
    <text x="1010" y="443" fill="#9198a1" font-size="12" text-anchor="end">position dans le contexte</text>

    <!-- U curve -->
    <path d="M200 210 C340 220 380 360 600 365 C820 360 860 220 1000 208" fill="none" stroke="#38bdf8" stroke-width="4"/>

    <!-- trough shading -->
    <rect x="430" y="330" width="340" height="90" fill="#f85149" opacity="0.10"/>
    <text x="600" y="400" text-anchor="middle" fill="#f85149" font-size="14" font-weight="600">le creux &#8212; the trough</text>

    <!-- labels -->
    <text x="240" y="250" text-anchor="middle" fill="#3fb950" font-size="14" font-weight="600">t&#234;te</text>
    <text x="240" y="270" text-anchor="middle" fill="#9198a1" font-size="12">prompt syst&#232;me, r&#232;gles</text>
    <text x="955" y="250" text-anchor="middle" fill="#3fb950" font-size="14" font-weight="600">queue</text>
    <text x="955" y="270" text-anchor="middle" fill="#9198a1" font-size="12">derniers tours</text>

    <!-- the drifting rule -->
    <circle cx="600" cy="365" r="9" fill="#ffa657"/>
    <text x="600" y="330" text-anchor="middle" fill="#ffa657" font-size="13.5" font-weight="600">votre r&#232;gle critique est assise ici</text>
    <path d="M340 228 Q470 260 585 352" stroke="#ffa657" stroke-width="1.8" stroke-dasharray="6 5" fill="none"/>
    <text x="430" y="255" text-anchor="middle" fill="#ffa657" font-size="11.5">elle d&#233;rive&#8230;</text>
  </g>

  <text x="600" y="497" text-anchor="middle" fill="#9198a1" font-size="13.5">la fen&#234;tre = m&#233;moire adressable &#183; l'attention = cache &#8212; petite, positionnelle, sous charge</text>

  <text x="600" y="560" text-anchor="middle" fill="#6e7681" font-size="15" letter-spacing="2">
    L'AGENTIC&#160;SDLC&#160;&#183;&#160;THE&#160;AGENTIC&#160;SDLC&#160;&#8212;&#160;D'APR&#200;S&#160;/&#160;AFTER&#160;DANIEL&#160;MEPPIEL
  </text>
</svg>
