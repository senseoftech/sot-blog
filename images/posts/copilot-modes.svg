<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.16"/>
      <stop offset="55%" stop-color="#38bdf8" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c2430"/>
      <stop offset="100%" stop-color="#12161d"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="600" fill="#0d1117"/>
  <rect width="1200" height="600" fill="url(#glow)"/>

  <g stroke="#30363d" stroke-opacity="0.18" stroke-width="1">
    <path d="M0 150 H1200 M0 300 H1200 M0 450 H1200"/>
    <path d="M300 0 V600 M600 0 V600 M900 0 V600"/>
  </g>

  <text x="600" y="66" text-anchor="middle" fill="#38bdf8" font-size="17" letter-spacing="4" font-weight="600">GITHUB COPILOT · MODES</text>

  <!-- ASK -->
  <g>
    <rect x="60" y="110" width="250" height="392" rx="16" fill="url(#card)" stroke="#3fb950" stroke-width="2"/>
    <text x="185" y="162" text-anchor="middle" fill="#e6edf3" font-size="27" font-weight="700">ASK</text>
    <text x="185" y="192" text-anchor="middle" fill="#9198a1" font-size="14">tu demandes ton chemin</text>
    <text x="90" y="250" fill="#9198a1" font-size="13" letter-spacing="1">COPILOT AU VOLANT</text>
    <rect x="90" y="262" width="190" height="12" rx="6" fill="#21262d"/>
    <rect x="90" y="262" width="24" height="12" rx="6" fill="#3fb950"/>
    <text x="185" y="330" text-anchor="middle" fill="#e6edf3" font-size="15">répond, ne</text>
    <text x="185" y="352" text-anchor="middle" fill="#e6edf3" font-size="15">touche à rien</text>
    <text x="185" y="470" text-anchor="middle" fill="#3fb950" font-size="14" font-weight="600">comprendre</text>
  </g>

  <!-- EDIT -->
  <g>
    <rect x="350" y="110" width="250" height="392" rx="16" fill="url(#card)" stroke="#38bdf8" stroke-width="2"/>
    <text x="475" y="162" text-anchor="middle" fill="#e6edf3" font-size="27" font-weight="700">EDIT</text>
    <text x="475" y="192" text-anchor="middle" fill="#9198a1" font-size="14">un tronçon précis</text>
    <text x="380" y="250" fill="#9198a1" font-size="13" letter-spacing="1">COPILOT AU VOLANT</text>
    <rect x="380" y="262" width="190" height="12" rx="6" fill="#21262d"/>
    <rect x="380" y="262" width="80" height="12" rx="6" fill="#38bdf8"/>
    <text x="475" y="330" text-anchor="middle" fill="#e6edf3" font-size="15">édite les</text>
    <text x="475" y="352" text-anchor="middle" fill="#e6edf3" font-size="15">fichiers choisis</text>
    <text x="475" y="470" text-anchor="middle" fill="#38bdf8" font-size="14" font-weight="600">retoucher</text>
  </g>

  <!-- AGENT -->
  <g>
    <rect x="640" y="110" width="250" height="392" rx="16" fill="url(#card)" stroke="#bc8cff" stroke-width="2"/>
    <text x="765" y="162" text-anchor="middle" fill="#e6edf3" font-size="27" font-weight="700">AGENT</text>
    <text x="765" y="192" text-anchor="middle" fill="#9198a1" font-size="14">tu confies le volant</text>
    <text x="670" y="250" fill="#9198a1" font-size="13" letter-spacing="1">COPILOT AU VOLANT</text>
    <rect x="670" y="262" width="190" height="12" rx="6" fill="#21262d"/>
    <rect x="670" y="262" width="172" height="12" rx="6" fill="#bc8cff"/>
    <text x="765" y="330" text-anchor="middle" fill="#e6edf3" font-size="15">planifie, code,</text>
    <text x="765" y="352" text-anchor="middle" fill="#e6edf3" font-size="15">teste, itère</text>
    <text x="765" y="470" text-anchor="middle" fill="#bc8cff" font-size="14" font-weight="600">construire</text>
  </g>

  <!-- PLAN -->
  <g>
    <rect x="930" y="110" width="250" height="392" rx="16" fill="url(#card)" stroke="#ffa657" stroke-width="2"/>
    <text x="1055" y="162" text-anchor="middle" fill="#e6edf3" font-size="27" font-weight="700">PLAN</text>
    <text x="1055" y="192" text-anchor="middle" fill="#9198a1" font-size="14">la carte avant le départ</text>
    <text x="960" y="250" fill="#9198a1" font-size="13" letter-spacing="1">CODE ÉCRIT</text>
    <rect x="960" y="262" width="190" height="12" rx="6" fill="#21262d"/>
    <rect x="960" y="262" width="6" height="12" rx="6" fill="#ffa657"/>
    <text x="1055" y="330" text-anchor="middle" fill="#e6edf3" font-size="15">explore, questionne,</text>
    <text x="1055" y="352" text-anchor="middle" fill="#e6edf3" font-size="15">trace l'itinéraire</text>
    <text x="1055" y="470" text-anchor="middle" fill="#ffa657" font-size="14" font-weight="600">cadrer d'abord</text>
  </g>

  <text x="600" y="556" text-anchor="middle" fill="#6e7681" font-size="18" letter-spacing="2">
    WHO  HOLDS  THE  WHEEL  ·  QUI  TIENT  LE  VOLANT
  </text>
</svg>
