<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.16"/>
      <stop offset="55%" stop-color="#38bdf8" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c2430"/>
      <stop offset="100%" stop-color="#12161d"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="600" fill="#0d1117"/>
  <rect width="1200" height="600" fill="url(#glow)"/>

  <g stroke="#30363d" stroke-opacity="0.18" stroke-width="1">
    <path d="M0 150 H1200 M0 300 H1200 M0 450 H1200"/>
    <path d="M300 0 V600 M600 0 V600 M900 0 V600"/>
  </g>

  <text x="600" y="62" text-anchor="middle" fill="#38bdf8" font-size="17" letter-spacing="4" font-weight="600">GLOSSAIRE&#160;&#160;DU&#160;&#160;DOMAINE&#160;&#160;·&#160;&#160;UBIQUITOUS&#160;&#160;LANGUAGE</text>

  <!-- Left: the chaos of synonyms -->
  <g>
    <text x="290" y="140" text-anchor="middle" fill="#9198a1" font-size="14" letter-spacing="1">QUATRE NOMS, UNE PERSONNE</text>

    <rect x="90" y="170" width="150" height="40" rx="20" fill="#12161d" stroke="#f85149" stroke-width="1.5"/>
    <text x="165" y="196" text-anchor="middle" fill="#e6edf3" font-size="16" font-family="Consolas, monospace">Client</text>

    <rect x="290" y="160" width="170" height="40" rx="20" fill="#12161d" stroke="#f85149" stroke-width="1.5"/>
    <text x="375" y="186" text-anchor="middle" fill="#e6edf3" font-size="16" font-family="Consolas, monospace">Customer</text>

    <rect x="120" y="250" width="160" height="40" rx="20" fill="#12161d" stroke="#f85149" stroke-width="1.5"/>
    <text x="200" y="276" text-anchor="middle" fill="#e6edf3" font-size="16" font-family="Consolas, monospace">Account</text>

    <rect x="310" y="248" width="130" height="40" rx="20" fill="#12161d" stroke="#f85149" stroke-width="1.5"/>
    <text x="375" y="274" text-anchor="middle" fill="#e6edf3" font-size="16" font-family="Consolas, monospace">TIERS</text>

    <text x="170" y="352" fill="#9198a1" font-size="14" font-style="italic">« attends, ton Account,</text>
    <text x="190" y="374" fill="#9198a1" font-size="14" font-style="italic">c'est mon Customer ? »</text>
  </g>

  <!-- Arrow -->
  <g>
    <path d="M500 280 H580" stroke="#38bdf8" stroke-width="3" fill="none"/>
    <path d="M580 280 l-14 -9 v18 z" fill="#38bdf8"/>
  </g>

  <!-- Right: the glossary card -->
  <g>
    <rect x="620" y="130" width="480" height="330" rx="16" fill="url(#card)" stroke="#3fb950" stroke-width="2"/>
    <text x="650" y="172" fill="#e6edf3" font-size="19" font-weight="700">docs/glossaire.md</text>
    <rect x="950" y="152" width="120" height="26" rx="13" fill="#12161d" stroke="#3fb950" stroke-width="1.5"/>
    <text x="1010" y="170" text-anchor="middle" fill="#3fb950" font-size="13" font-weight="600">relu en PR</text>

    <text x="650" y="214" fill="#38bdf8" font-size="15" font-weight="600" letter-spacing="1">ASSURÉ</text>
    <text x="740" y="214" fill="#9198a1" font-size="14" font-family="Consolas, monospace">(code : Customer)</text>
    <rect x="650" y="226" width="380" height="8" rx="4" fill="#21262d"/>
    <rect x="650" y="240" width="300" height="8" rx="4" fill="#21262d"/>

    <text x="650" y="282" fill="#ffa657" font-size="14" font-weight="600">&#8800; Souscripteur — celui qui paie</text>
    <text x="650" y="308" fill="#ffa657" font-size="14" font-weight="600">table TIERS : héritage ERP, ne pas renommer</text>

    <text x="650" y="350" fill="#38bdf8" font-size="15" font-weight="600" letter-spacing="1">SINISTRE</text>
    <text x="750" y="350" fill="#9198a1" font-size="14" font-family="Consolas, monospace">(code : Claim)</text>
    <rect x="650" y="362" width="350" height="8" rx="4" fill="#21262d"/>

    <text x="650" y="404" fill="#3fb950" font-size="14">+ un refusé reste un sinistre (le métier y tient)</text>
    <text x="650" y="436" fill="#9198a1" font-size="13">l'IA propose · l'humain tranche · le dépôt mémorise</text>
  </g>

  <text x="600" y="548" text-anchor="middle" fill="#6e7681" font-size="16" letter-spacing="2">
    UN  MOT,  UN  SENS  ·  ONE  WORD,  ONE  MEANING
  </text>
</svg>
