<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.16"/>
      <stop offset="55%" stop-color="#38bdf8" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c2430"/>
      <stop offset="100%" stop-color="#12161d"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="600" fill="#0d1117"/>
  <rect width="1200" height="600" fill="url(#glow)"/>

  <g stroke="#30363d" stroke-opacity="0.18" stroke-width="1">
    <path d="M0 150 H1200 M0 300 H1200 M0 450 H1200"/>
    <path d="M300 0 V600 M600 0 V600 M900 0 V600"/>
  </g>

  <text x="600" y="62" text-anchor="middle" fill="#38bdf8" font-size="17" letter-spacing="4" font-weight="600">ADR&#160;&#160;·&#160;&#160;ARCHITECTURE&#160;&#160;DECISION&#160;&#160;RECORDS</text>

  <!-- The record card -->
  <g>
    <rect x="80" y="120" width="420" height="360" rx="16" fill="url(#card)" stroke="#3fb950" stroke-width="2"/>
    <text x="110" y="164" fill="#e6edf3" font-size="20" font-weight="700">ADR-0007</text>
    <rect x="300" y="146" width="90" height="26" rx="13" fill="#12161d" stroke="#3fb950" stroke-width="1.5"/>
    <text x="345" y="164" text-anchor="middle" fill="#3fb950" font-size="13" font-weight="600">accepté</text>

    <text x="110" y="204" fill="#38bdf8" font-size="14" font-weight="600" letter-spacing="1">CONTEXTE</text>
    <rect x="110" y="214" width="330" height="8" rx="4" fill="#21262d"/>
    <rect x="110" y="228" width="270" height="8" rx="4" fill="#21262d"/>

    <text x="110" y="266" fill="#38bdf8" font-size="14" font-weight="600" letter-spacing="1">OPTIONS</text>
    <rect x="110" y="276" width="300" height="8" rx="4" fill="#21262d"/>
    <rect x="110" y="290" width="240" height="8" rx="4" fill="#21262d"/>

    <text x="110" y="328" fill="#ffa657" font-size="14" font-weight="600" letter-spacing="1">DÉCISION</text>
    <rect x="110" y="338" width="330" height="10" rx="5" fill="#ffa657" fill-opacity="0.55"/>

    <text x="110" y="384" fill="#38bdf8" font-size="14" font-weight="600" letter-spacing="1">CONSÉQUENCES</text>
    <text x="110" y="410" fill="#3fb950" font-size="14">+ un moule répétable</text>
    <text x="110" y="432" fill="#f85149" font-size="14">− une courbe d'apprentissage</text>
    <text x="110" y="460" fill="#9198a1" font-size="12">le bon ET le moins bon, assumés</text>
  </g>

  <!-- Timeline -->
  <g>
    <path d="M580 300 H1120" stroke="#30363d" stroke-width="3"/>

    <circle cx="640" cy="300" r="10" fill="#3fb950"/>
    <text x="640" y="270" text-anchor="middle" fill="#e6edf3" font-size="14" font-weight="600">0001</text>
    <text x="640" y="334" text-anchor="middle" fill="#9198a1" font-size="12">accepté</text>

    <circle cx="790" cy="300" r="10" fill="#6e7681"/>
    <text x="790" y="270" text-anchor="middle" fill="#e6edf3" font-size="14" font-weight="600">0004</text>
    <text x="790" y="334" text-anchor="middle" fill="#9198a1" font-size="12">remplacé ↓</text>
    <path d="M810 310 Q870 360 930 312" stroke="#ffa657" stroke-width="2" stroke-dasharray="5 4" fill="none"/>

    <circle cx="940" cy="300" r="10" fill="#3fb950"/>
    <text x="940" y="270" text-anchor="middle" fill="#e6edf3" font-size="14" font-weight="600">0012</text>
    <text x="940" y="334" text-anchor="middle" fill="#9198a1" font-size="12">le remplace</text>

    <circle cx="1080" cy="300" r="10" fill="#1c2430" stroke="#38bdf8" stroke-width="3"/>
    <text x="1080" y="270" text-anchor="middle" fill="#e6edf3" font-size="14" font-weight="600">0013</text>
    <text x="1080" y="334" text-anchor="middle" fill="#38bdf8" font-size="12">proposé</text>

    <text x="850" y="170" text-anchor="middle" fill="#e6edf3" font-size="18" font-weight="600">docs/adr/ — la chronologie des choix</text>
    <text x="850" y="196" text-anchor="middle" fill="#9198a1" font-size="13">on n'efface jamais, on remplace</text>

    <text x="850" y="416" text-anchor="middle" fill="#9198a1" font-size="14">l'humain décide · l'IA consigne · l'ADR re-contextualise</text>
  </g>

  <text x="600" y="548" text-anchor="middle" fill="#6e7681" font-size="16" letter-spacing="2">
    LA  MÉMOIRE  DES  DÉCISIONS  ·  THE  MEMORY  OF  DECISIONS
  </text>
</svg>
