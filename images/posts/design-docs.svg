<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.16"/>
      <stop offset="55%" stop-color="#38bdf8" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c2430"/>
      <stop offset="100%" stop-color="#12161d"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="600" fill="#0d1117"/>
  <rect width="1200" height="600" fill="url(#glow)"/>

  <g stroke="#30363d" stroke-opacity="0.18" stroke-width="1">
    <path d="M0 150 H1200 M0 300 H1200 M0 450 H1200"/>
    <path d="M300 0 V600 M600 0 V600 M900 0 V600"/>
  </g>

  <text x="600" y="62" text-anchor="middle" fill="#38bdf8" font-size="17" letter-spacing="4" font-weight="600">RFC&#160;&#160;·&#160;&#160;DESIGN&#160;&#160;DOCS&#160;&#160;·&#160;&#160;DÉCIDER&#160;&#160;AVANT&#160;&#160;DE&#160;&#160;CODER</text>

  <!-- The RFC document -->
  <g>
    <rect x="400" y="108" width="340" height="400" rx="16" fill="url(#card)" stroke="#38bdf8" stroke-width="2"/>
    <text x="428" y="150" fill="#e6edf3" font-size="20" font-weight="700">RFC-012</text>
    <rect x="580" y="132" width="132" height="26" rx="13" fill="#12161d" stroke="#ffa657" stroke-width="1.5"/>
    <text x="646" y="150" text-anchor="middle" fill="#ffa657" font-size="13" font-weight="600">en discussion</text>

    <text x="428" y="190" fill="#38bdf8" font-size="13" font-weight="600" letter-spacing="1">PROBLÈME</text>
    <rect x="428" y="200" width="284" height="8" rx="4" fill="#21262d"/>
    <rect x="428" y="214" width="220" height="8" rx="4" fill="#21262d"/>

    <text x="428" y="248" fill="#38bdf8" font-size="13" font-weight="600" letter-spacing="1">CONTRAINTES</text>
    <rect x="428" y="258" width="250" height="8" rx="4" fill="#21262d"/>

    <text x="428" y="294" fill="#38bdf8" font-size="13" font-weight="600" letter-spacing="1">OPTIONS</text>
    <text x="428" y="318" fill="#e6edf3" font-size="14" font-weight="600">A</text>
    <text x="450" y="318" fill="#3fb950" font-size="13">+ isolation</text>
    <text x="560" y="318" fill="#f85149" font-size="13">− coût ×N</text>
    <text x="428" y="342" fill="#e6edf3" font-size="14" font-weight="600">B</text>
    <text x="450" y="342" fill="#3fb950" font-size="13">+ compromis</text>
    <text x="560" y="342" fill="#f85149" font-size="13">− outillage</text>
    <text x="428" y="366" fill="#e6edf3" font-size="14" font-weight="600">C</text>
    <text x="450" y="366" fill="#3fb950" font-size="13">+ pas cher</text>
    <text x="560" y="366" fill="#f85149" font-size="13">− discipline</text>

    <text x="428" y="402" fill="#ffa657" font-size="13" font-weight="600" letter-spacing="1">RECOMMANDATION</text>
    <rect x="428" y="412" width="284" height="10" rx="5" fill="#ffa657" fill-opacity="0.55"/>

    <text x="428" y="452" fill="#bc8cff" font-size="13" font-weight="600" letter-spacing="1">QUESTIONS OUVERTES</text>
    <rect x="428" y="462" width="200" height="8" rx="4" fill="#21262d"/>

    <text x="428" y="494" fill="#9198a1" font-size="12">commentaires jusqu'au 05/09 — ensuite, on tranche</text>
  </g>

  <!-- Comment bubbles -->
  <g>
    <path d="M368 168 Q400 190 412 208" stroke="#3fb950" stroke-width="1.5" stroke-dasharray="4 4" fill="none"/>
    <rect x="150" y="128" width="220" height="52" rx="14" fill="url(#card)" stroke="#3fb950" stroke-width="2"/>
    <text x="176" y="160" fill="#3fb950" font-size="16" font-weight="600">+1 sur l'option C</text>

    <path d="M362 300 Q384 306 398 312" stroke="#f85149" stroke-width="1.5" stroke-dasharray="4 4" fill="none"/>
    <rect x="118" y="268" width="244" height="52" rx="14" fill="url(#card)" stroke="#f85149" stroke-width="2"/>
    <text x="144" y="300" fill="#f85149" font-size="16" font-weight="600">objection : coût ×N</text>

    <path d="M356 438 Q384 430 400 420" stroke="#bc8cff" stroke-width="1.5" stroke-dasharray="4 4" fill="none"/>
    <rect x="112" y="412" width="244" height="52" rx="14" fill="url(#card)" stroke="#bc8cff" stroke-width="2"/>
    <text x="138" y="444" fill="#bc8cff" font-size="16" font-weight="600">et la migration&#160;?</text>

    <path d="M842 190 Q810 200 752 212" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="4 4" fill="none"/>
    <rect x="820" y="128" width="260" height="52" rx="14" fill="url(#card)" stroke="#38bdf8" stroke-width="2"/>
    <text x="846" y="160" fill="#38bdf8" font-size="16" font-weight="600">la réunion, par écrit</text>
  </g>

  <!-- Decision arrow to ADR -->
  <g>
    <path d="M752 340 H896" stroke="#3fb950" stroke-width="3"/>
    <path d="M896 340 l-14 -8 v16 z" fill="#3fb950"/>
    <text x="824" y="324" text-anchor="middle" fill="#3fb950" font-size="14" font-weight="600">décision</text>
  </g>

  <!-- The ADR card -->
  <g>
    <rect x="908" y="264" width="222" height="150" rx="16" fill="url(#card)" stroke="#3fb950" stroke-width="2"/>
    <text x="934" y="304" fill="#e6edf3" font-size="18" font-weight="700">ADR-0021</text>
    <rect x="1028" y="288" width="82" height="24" rx="12" fill="#12161d" stroke="#3fb950" stroke-width="1.5"/>
    <text x="1069" y="305" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="600">accepté</text>
    <rect x="934" y="324" width="170" height="8" rx="4" fill="#21262d"/>
    <rect x="934" y="338" width="130" height="8" rx="4" fill="#21262d"/>
    <text x="934" y="374" fill="#9198a1" font-size="13">la conclusion, archivée</text>
    <text x="934" y="394" fill="#6e7681" font-size="12">→ cite RFC-012</text>
  </g>

  <text x="600" y="548" text-anchor="middle" fill="#6e7681" font-size="16" letter-spacing="2">
    LE  DÉBAT  AVANT  LE  CODE  ·  THE  DEBATE  BEFORE  THE  CODE
  </text>
</svg>
