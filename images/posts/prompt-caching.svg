<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.16"/>
      <stop offset="55%" stop-color="#38bdf8" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c2430"/>
      <stop offset="100%" stop-color="#12161d"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="#0d1117"/>
  <rect width="1200" height="600" fill="url(#glow)"/>
  <g stroke="#30363d" stroke-opacity="0.18" stroke-width="1">
    <path d="M0 150 H1200 M0 300 H1200 M0 450 H1200"/>
    <path d="M300 0 V600 M600 0 V600 M900 0 V600"/>
  </g>
  <text x="600" y="60" text-anchor="middle" fill="#38bdf8" font-size="17" letter-spacing="4" font-weight="600">PROMPT&#160;&#160;CACHING</text>

  <!-- The prompt bar -->
  <text x="100" y="130" fill="#9198a1" font-size="13" letter-spacing="1">L'ARCHITECTURE D'UN PROMPT CACHABLE — du plus stable au plus volatil :</text>
  <g>
    <rect x="100" y="150" width="330" height="70" rx="10" fill="#12261d" stroke="#3fb950" stroke-width="2"/>
    <text x="265" y="180" text-anchor="middle" fill="#3fb950" font-size="14" font-weight="700">instructions système</text>
    <text x="265" y="202" text-anchor="middle" fill="#9198a1" font-size="11">ne bougent jamais</text>

    <rect x="434" y="150" width="270" height="70" rx="10" fill="#12261d" stroke="#3fb950" stroke-width="2"/>
    <text x="569" y="180" text-anchor="middle" fill="#3fb950" font-size="14" font-weight="700">catalogue d'outils</text>
    <text x="569" y="202" text-anchor="middle" fill="#9198a1" font-size="11">figé pour la session</text>

    <rect x="708" y="150" width="250" height="70" rx="10" fill="#1c2430" stroke="#38bdf8" stroke-width="2"/>
    <text x="833" y="180" text-anchor="middle" fill="#38bdf8" font-size="14" font-weight="700">historique</text>
    <text x="833" y="202" text-anchor="middle" fill="#9198a1" font-size="11">grandit par la fin ✓</text>

    <rect x="962" y="150" width="140" height="70" rx="10" fill="#1c2430" stroke="#ffa657" stroke-width="2"/>
    <text x="1032" y="180" text-anchor="middle" fill="#ffa657" font-size="14" font-weight="700">tour courant</text>
    <text x="1032" y="202" text-anchor="middle" fill="#9198a1" font-size="11">jamais caché</text>

    <path d="M100 240 H958" stroke="#3fb950" stroke-width="4"/>
    <text x="530" y="264" text-anchor="middle" fill="#3fb950" font-size="13" font-weight="600">← préfixe identique = digéré une fois, relu à tarif réduit →</text>
  </g>

  <!-- The killer -->
  <g>
    <rect x="100" y="310" width="480" height="120" rx="14" fill="url(#card)" stroke="#f85149" stroke-width="2"/>
    <text x="340" y="344" text-anchor="middle" fill="#f85149" font-size="15" font-weight="700">LE TUEUR DE CACHE N°1</text>
    <rect x="130" y="360" width="420" height="30" rx="6" fill="#0d1117" stroke="#f85149" stroke-width="1.5"/>
    <text x="340" y="380" text-anchor="middle" fill="#e6edf3" font-size="12" font-family="Consolas, monospace">« Nous sommes le 30/07/2026, 10:47:23 »</text>
    <text x="340" y="416" text-anchor="middle" fill="#9198a1" font-size="12">en 1re ligne = préfixe différent à chaque requête = 0 cache</text>
  </g>

  <!-- The numbers -->
  <g>
    <rect x="620" y="310" width="480" height="120" rx="14" fill="url(#card)" stroke="#3fb950" stroke-width="2"/>
    <text x="860" y="344" text-anchor="middle" fill="#3fb950" font-size="15" font-weight="700">L'ORDRE DE GRANDEUR</text>
    <text x="860" y="374" text-anchor="middle" fill="#e6edf3" font-size="13">agent : 20 k tokens de socle × 30 tours d'outils</text>
    <text x="860" y="400" text-anchor="middle" fill="#e6edf3" font-size="13">sans cache : ~600 k plein tarif · avec : 1× plein + 29× réduit</text>
    <text x="860" y="422" text-anchor="middle" fill="#3fb950" font-size="13" font-weight="600">60 à 90 % de la facture d'entrée en moins</text>
  </g>

  <text x="600" y="486" text-anchor="middle" fill="#9198a1" font-size="13">OpenAI : automatique · Anthropic : breakpoints · vos outils : géré pour vous — surveillez `cached_tokens`</text>

  <text x="600" y="552" text-anchor="middle" fill="#6e7681" font-size="16" letter-spacing="2">
    TOUT  SE  JOUE  SUR  LE  PRÉFIXE  ·  IT  ALL  HINGES  ON  THE  PREFIX
  </text>
</svg>
