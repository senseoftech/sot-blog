<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.16"/>
      <stop offset="55%" stop-color="#38bdf8" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c2430"/>
      <stop offset="100%" stop-color="#12161d"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="#0d1117"/>
  <rect width="1200" height="600" fill="url(#glow)"/>
  <g stroke="#30363d" stroke-opacity="0.18" stroke-width="1">
    <path d="M0 150 H1200 M0 300 H1200 M0 450 H1200"/>
    <path d="M300 0 V600 M600 0 V600 M900 0 V600"/>
  </g>
  <text x="600" y="60" text-anchor="middle" fill="#38bdf8" font-size="17" letter-spacing="4" font-weight="600">RAG&#160;&#160;EN&#160;&#160;.NET</text>

  <!-- Pipeline ingestion -->
  <text x="110" y="126" fill="#9198a1" font-size="13" letter-spacing="1">PIPELINE 1 · INGESTION</text>
  <g>
    <rect x="90" y="140" width="220" height="80" rx="12" fill="url(#card)" stroke="#38bdf8" stroke-width="2"/>
    <text x="200" y="174" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="600">Chunk</text>
    <text x="200" y="198" text-anchor="middle" fill="#9198a1" font-size="11">titres → paragraphes + overlap</text>
    <path d="M310 180 H360" stroke="#6e7681" stroke-width="2"/>
    <rect x="360" y="140" width="220" height="80" rx="12" fill="url(#card)" stroke="#38bdf8" stroke-width="2"/>
    <text x="470" y="168" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="600">Embed</text>
    <text x="470" y="190" text-anchor="middle" fill="#9198a1" font-size="10" font-family="Consolas, monospace">IEmbeddingGenerator</text>
    <text x="470" y="208" text-anchor="middle" fill="#9198a1" font-size="11">texte → coordonnées</text>
    <path d="M580 180 H630" stroke="#6e7681" stroke-width="2"/>
    <rect x="630" y="140" width="220" height="80" rx="12" fill="url(#card)" stroke="#38bdf8" stroke-width="2"/>
    <text x="740" y="168" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="600">Store</text>
    <text x="740" y="190" text-anchor="middle" fill="#9198a1" font-size="10" font-family="Consolas, monospace">VectorData + Source</text>
    <text x="740" y="208" text-anchor="middle" fill="#9198a1" font-size="11">la bibliothèque, rangée par sens</text>
  </g>

  <!-- Pipeline question -->
  <text x="110" y="286" fill="#9198a1" font-size="13" letter-spacing="1">PIPELINE 2 · QUESTION</text>
  <g>
    <rect x="90" y="300" width="220" height="80" rx="12" fill="url(#card)" stroke="#3fb950" stroke-width="2"/>
    <text x="200" y="334" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="600">Embed la question</text>
    <text x="200" y="358" text-anchor="middle" fill="#9198a1" font-size="11">même carte des idées</text>
    <path d="M310 340 H360" stroke="#6e7681" stroke-width="2"/>
    <rect x="360" y="300" width="220" height="80" rx="12" fill="url(#card)" stroke="#3fb950" stroke-width="2"/>
    <text x="470" y="334" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="600">Search top 5</text>
    <text x="470" y="358" text-anchor="middle" fill="#9198a1" font-size="11">les voisins les plus proches</text>
    <path d="M580 340 H630" stroke="#6e7681" stroke-width="2"/>
    <rect x="630" y="300" width="220" height="80" rx="12" fill="url(#card)" stroke="#3fb950" stroke-width="2"/>
    <text x="740" y="328" text-anchor="middle" fill="#e6edf3" font-size="14" font-weight="600">Prompt discipliné</text>
    <text x="740" y="349" text-anchor="middle" fill="#9198a1" font-size="10.5">uniquement les extraits · cite</text>
    <text x="740" y="367" text-anchor="middle" fill="#9198a1" font-size="10.5">avoue si ça manque</text>
    <path d="M850 340 H900" stroke="#6e7681" stroke-width="2"/>
    <rect x="900" y="300" width="210" height="80" rx="12" fill="#0d1117" stroke="#3fb950" stroke-width="3"/>
    <text x="1005" y="334" text-anchor="middle" fill="#3fb950" font-size="15" font-weight="700">Réponse citée</text>
    <text x="1005" y="358" text-anchor="middle" fill="#9198a1" font-size="11">[politique-frais.md]</text>
  </g>

  <!-- Eval loop -->
  <g>
    <rect x="240" y="440" width="720" height="72" rx="12" fill="url(#card)" stroke="#ffa657" stroke-width="2"/>
    <text x="600" y="470" text-anchor="middle" fill="#ffa657" font-size="15" font-weight="700">ÉTAPE 5 · MESURER : le bon morceau est-il dans le top 5 ?</text>
    <text x="600" y="496" text-anchor="middle" fill="#9198a1" font-size="12">20 questions en or → ajuster le chunking → rejouer — le RAG est un système, pas un one-shot</text>
  </g>

  <text x="600" y="560" text-anchor="middle" fill="#6e7681" font-size="16" letter-spacing="2">
    LE  BIBLIOTHÉCAIRE,  EMBAUCHÉ  ·  THE  LIBRARIAN,  HIRED
  </text>
</svg>
