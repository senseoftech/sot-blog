<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.16"/>
      <stop offset="55%" stop-color="#38bdf8" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c2430"/>
      <stop offset="100%" stop-color="#12161d"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="#0d1117"/>
  <rect width="1200" height="600" fill="url(#glow)"/>
  <g stroke="#30363d" stroke-opacity="0.18" stroke-width="1">
    <path d="M0 150 H1200 M0 300 H1200 M0 450 H1200"/>
    <path d="M300 0 V600 M600 0 V600 M900 0 V600"/>
  </g>
  <text x="600" y="60" text-anchor="middle" fill="#38bdf8" font-size="17" letter-spacing="4" font-weight="600">A2A&#160;&#160;·&#160;&#160;AGENT-TO-AGENT</text>

  <!-- Your company -->
  <g>
    <rect x="80" y="120" width="380" height="300" rx="16" fill="url(#card)" stroke="#3fb950" stroke-width="2"/>
    <text x="270" y="158" text-anchor="middle" fill="#e6edf3" font-size="17" font-weight="700">VOTRE ENTREPRISE</text>
    <circle cx="270" cy="230" r="34" fill="#0d1117" stroke="#3fb950" stroke-width="3"/>
    <text x="270" y="237" text-anchor="middle" fill="#3fb950" font-size="14" font-weight="700">agent</text>
    <text x="270" y="286" text-anchor="middle" fill="#9198a1" font-size="12">logistique</text>
    <g stroke="#3fb950" stroke-width="1.5" stroke-opacity="0.5">
      <path d="M250 260 L180 330 M290 260 L360 330"/>
    </g>
    <rect x="120" y="330" width="120" height="46" rx="8" fill="#12161d" stroke="#30363d"/>
    <text x="180" y="358" text-anchor="middle" fill="#9198a1" font-size="11">outils MCP internes</text>
    <rect x="300" y="330" width="120" height="46" rx="8" fill="#12161d" stroke="#30363d"/>
    <text x="360" y="358" text-anchor="middle" fill="#9198a1" font-size="11">workflows</text>
    <text x="270" y="404" text-anchor="middle" fill="#6e7681" font-size="11">la prise dans les ateliers</text>
  </g>

  <!-- The exchange -->
  <g>
    <rect x="470" y="160" width="260" height="90" rx="12" fill="#0d1117" stroke="#ffa657" stroke-width="2"/>
    <text x="600" y="190" text-anchor="middle" fill="#ffa657" font-size="13" font-weight="700">📇 Agent Card</text>
    <text x="600" y="212" text-anchor="middle" fill="#9198a1" font-size="10.5" font-family="Consolas, monospace">/.well-known/agent-card.json</text>
    <text x="600" y="234" text-anchor="middle" fill="#e6edf3" font-size="11">qui je suis · mes skills · où · auth</text>

    <path d="M470 300 H730 l-10 -9 M730 300 l-10 9" stroke="#38bdf8" stroke-width="3" fill="none" stroke-linecap="round"/>
    <text x="600" y="288" text-anchor="middle" fill="#38bdf8" font-size="12">task : « replanifie la livraison »</text>

    <rect x="470" y="320" width="260" height="64" rx="12" fill="url(#card)" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="600" y="346" text-anchor="middle" fill="#e6edf3" font-size="12">soumise → en cours → terminée</text>
    <text x="600" y="368" text-anchor="middle" fill="#9198a1" font-size="11">questions en retour · artifacts en livraison</text>
  </g>

  <!-- Partner company -->
  <g>
    <rect x="740" y="120" width="380" height="300" rx="16" fill="url(#card)" stroke="#bc8cff" stroke-width="2"/>
    <text x="930" y="158" text-anchor="middle" fill="#e6edf3" font-size="17" font-weight="700">LE TRANSPORTEUR</text>
    <circle cx="930" cy="230" r="34" fill="#0d1117" stroke="#bc8cff" stroke-width="3"/>
    <text x="930" y="237" text-anchor="middle" fill="#bc8cff" font-size="14" font-weight="700">agent</text>
    <text x="930" y="286" text-anchor="middle" fill="#9198a1" font-size="12">livraisons</text>
    <rect x="800" y="330" width="260" height="46" rx="8" fill="#12161d" stroke="#30363d" stroke-dasharray="6 4"/>
    <text x="930" y="352" text-anchor="middle" fill="#9198a1" font-size="11">raisonnement · outils · données</text>
    <text x="930" y="368" text-anchor="middle" fill="#f85149" font-size="11" font-weight="600">OPAQUES — on ne visite pas l'usine</text>
    <text x="930" y="404" text-anchor="middle" fill="#6e7681" font-size="11">le comptoir des commandes</text>
  </g>

  <text x="600" y="470" text-anchor="middle" fill="#e6edf3" font-size="14" font-weight="600">MCP branche des outils sur un agent · A2A fait dialoguer des agents entre eux</text>
  <text x="600" y="496" text-anchor="middle" fill="#9198a1" font-size="12">Linux Foundation · adopté dans Foundry &amp; Agent Framework</text>

  <text x="600" y="556" text-anchor="middle" fill="#6e7681" font-size="16" letter-spacing="2">
    LA  PRISE  ET  LE  TÉLÉPHONE  ·  THE  SOCKET  AND  THE  TELEPHONE
  </text>
</svg>
