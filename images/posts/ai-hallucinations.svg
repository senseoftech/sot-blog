    <text x="240" y="490" fill="#e6edf3" font-size="14" font-weight="600">le modèle ne consulte pas les faits, il complète.</text>
  </g>

  <!-- Right: the verdict card -->
  <g>
    <rect x="770" y="262" width="340 " height="228" rx="16" fill="url(#card)" stroke="#bc8cff" stroke-width="2"/>
    <text x="940" y="304" text-anchor="middle" fill="#e6edf3" font-size="19" font-weight="700">LES GARDE-FOUS</text>
    <text x="800" y="342" fill="#3fb950" font-size="15">✓ ancrer avec le RAG</text>
    <text x="800" y="372" fill="#3fb950" font-size="15">✓ compiler, tester (le harnais)</text>
    <text x="800" y="402" fill="#3fb950" font-size="15">✓ exiger les sources</text>
    <text x="800" y="432" fill="#3fb950" font-size="15">✓ vérifier le vérifiable</text>
    <text x="800" y="466" fill="#9198a1" font-size="13">on ne supprime pas, on borde</text>
  </g>

  <text x="600" y="548" text-anchor="middle" fill="#6e7681" font-size="16" letter-spacing="2">
    PLAUSIBLE  N'EST  PAS  VRAI  ·  PLAUSIBLE  IS  NOT  TRUE
  </text>
