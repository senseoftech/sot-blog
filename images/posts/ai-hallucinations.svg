<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.16"/>
      <stop offset="55%" stop-color="#38bdf8" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c2430"/>
      <stop offset="100%" stop-color="#12161d"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="600" fill="#0d1117"/>
  <rect width="1200" height="600" fill="url(#glow)"/>

  <g stroke="#30363d" stroke-opacity="0.18" stroke-width="1">
    <path d="M0 150 H1200 M0 300 H1200 M0 450 H1200"/>
    <path d="M300 0 V600 M600 0 V600 M900 0 V600"/>
  </g>

  <text x="600" y="62" text-anchor="middle" fill="#38bdf8" font-size="17" letter-spacing="4" font-weight="600">POURQUOI&#160;&#160;L'IA&#160;&#160;HALLUCINE</text>

  <!-- The sentence being completed -->
  <g>
    <rect x="90" y="120" width="1020" height="86" rx="14" fill="url(#card)" stroke="#38bdf8" stroke-width="2"/>
    <text x="120" y="172" fill="#e6edf3" font-size="20" font-family="Consolas, monospace">dotnet add package Microsoft.Extensions.</text>
    <rect x="608" y="146" width="180" height="38" rx="8" fill="#0d1117" stroke="#ffa657" stroke-width="2" stroke-dasharray="6 4"/>
    <text x="698" y="172" text-anchor="middle" fill="#ffa657" font-size="18" font-family="Consolas, monospace">???</text>
    <text x="1080" y="172" text-anchor="end" fill="#9198a1" font-size="14">le prochain token ?</text>
  </g>

  <!-- Candidate tokens with probabilities -->
  <g>
    <text x="240" y="262" fill="#9198a1" font-size="14" letter-spacing="1">LES CANDIDATS LES PLUS PLAUSIBLES :</text>

    <rect x="240" y="282" width="450" height="44" rx="10" fill="url(#card)" stroke="#3fb950" stroke-width="2"/>
    <text x="264" y="310" fill="#e6edf3" font-size="16" font-family="Consolas, monospace">Logging</text>
    <rect x="430" y="296" width="180" height="14" rx="7" fill="#21262d"/>
    <rect x="430" y="296" width="150" height="14" rx="7" fill="#3fb950"/>
    <text x="660" y="310" fill="#3fb950" font-size="14">existe ✓</text>

    <rect x="240" y="336" width="450" height="44" rx="10" fill="url(#card)" stroke="#3fb950" stroke-width="2"/>
    <text x="264" y="364" fill="#e6edf3" font-size="16" font-family="Consolas, monospace">Caching</text>
    <rect x="430" y="350" width="180" height="14" rx="7" fill="#21262d"/>
    <rect x="430" y="350" width="110" height="14" rx="7" fill="#3fb950"/>
    <text x="660" y="364" fill="#3fb950" font-size="14">existe ✓</text>

    <rect x="240" y="390" width="450" height="44" rx="10" fill="url(#card)" stroke="#ffa657" stroke-width="3"/>
    <text x="264" y="418" fill="#e6edf3" font-size="16" font-family="Consolas, monospace">SuperJson</text>
    <rect x="430" y="404" width="180" height="14" rx="7" fill="#21262d"/>
    <rect x="430" y="404" width="88" height="14" rx="7" fill="#ffa657"/>
    <text x="660" y="418" fill="#ffa657" font-size="14">inventé ✗</text>

