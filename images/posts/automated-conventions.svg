<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.16"/>
      <stop offset="55%" stop-color="#38bdf8" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c2430"/>
      <stop offset="100%" stop-color="#12161d"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="600" fill="#0d1117"/>
  <rect width="1200" height="600" fill="url(#glow)"/>

  <g stroke="#30363d" stroke-opacity="0.18" stroke-width="1">
    <path d="M0 150 H1200 M0 300 H1200 M0 450 H1200"/>
    <path d="M300 0 V600 M600 0 V600 M900 0 V600"/>
  </g>

  <text x="600" y="62" text-anchor="middle" fill="#38bdf8" font-size="17" letter-spacing="4" font-weight="600">LINTERS&#160;&#160;&amp;&#160;&#160;ANALYZERS&#160;&#160;·&#160;&#160;CONVENTIONS&#160;&#160;AUTOMATIQUES</text>

  <!-- Roadside sign : .editorconfig -->
  <g>
    <rect x="206" y="146" width="8" height="50" rx="2" fill="#30363d"/>
    <rect x="105" y="100" width="210" height="46" rx="10" fill="url(#card)" stroke="#38bdf8" stroke-width="2"/>
    <text x="210" y="130" text-anchor="middle" fill="#38bdf8" font-size="18" font-weight="700" font-family="Consolas, monospace">.editorconfig</text>
    <text x="340" y="128" fill="#9198a1" font-size="12">style + sévérités, versionné</text>
  </g>

  <!-- Headline right -->
  <text x="810" y="112" text-anchor="middle" fill="#e6edf3" font-size="18" font-weight="600">la glissière rattrape tout le monde</text>
  <text x="810" y="136" text-anchor="middle" fill="#9198a1" font-size="13">humain ou IA — pareil</text>

  <!-- The road -->
  <g>
    <rect x="80" y="200" width="1040" height="160" fill="#12161d" stroke="#30363d" stroke-width="1"/>
    <path d="M100 226 H920" stroke="#30363d" stroke-width="2" stroke-dasharray="18 14"/>
    <path d="M100 334 H920" stroke="#30363d" stroke-width="2" stroke-dasharray="18 14"/>

    <!-- Top guardrail (blue) -->
    <path d="M80 192 H1120" stroke="#38bdf8" stroke-width="5"/>
    <g fill="#38bdf8" fill-opacity="0.6">
      <rect x="150" y="194" width="6" height="10"/>
      <rect x="330" y="194" width="6" height="10"/>
      <rect x="510" y="194" width="6" height="10"/>
      <rect x="690" y="194" width="6" height="10"/>
      <rect x="870" y="194" width="6" height="10"/>
      <rect x="1050" y="194" width="6" height="10"/>
    </g>
    <text x="600" y="178" text-anchor="middle" fill="#9198a1" font-size="12">glissière = règle appliquée par la machine</text>

    <!-- Bottom guardrail (green) -->
    <path d="M80 368 H1120" stroke="#3fb950" stroke-width="5"/>
    <g fill="#3fb950" fill-opacity="0.6">
      <rect x="150" y="356" width="6" height="10"/>
      <rect x="330" y="356" width="6" height="10"/>
      <rect x="510" y="356" width="6" height="10"/>
      <rect x="690" y="356" width="6" height="10"/>
      <rect x="870" y="356" width="6" height="10"/>
      <rect x="1050" y="356" width="6" height="10"/>
    </g>
    <text x="600" y="392" text-anchor="middle" fill="#9198a1" font-size="12">pas de briefing conducteur — le rail corrige la trajectoire</text>
  </g>

  <!-- Car : dev -->
  <g>
    <path d="M210 268 h-34 M210 292 h-24" stroke="#ffa657" stroke-opacity="0.5" stroke-width="3"/>
    <rect x="238" y="252" width="10" height="8" rx="2" fill="#0d1117"/>
    <rect x="300" y="252" width="10" height="8" rx="2" fill="#0d1117"/>
    <rect x="238" y="300" width="10" height="8" rx="2" fill="#0d1117"/>
    <rect x="300" y="300" width="10" height="8" rx="2" fill="#0d1117"/>
    <rect x="228" y="256" width="104" height="48" rx="14" fill="url(#card)" stroke="#ffa657" stroke-width="2"/>
    <rect x="300" y="262" width="10" height="36" rx="4" fill="#ffa657" fill-opacity="0.35"/>
    <text x="278" y="286" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="700">dev</text>
  </g>

  <!-- Car : agent IA -->
  <g>
    <path d="M448 268 h-34 M448 292 h-24" stroke="#bc8cff" stroke-opacity="0.5" stroke-width="3"/>
    <rect x="476" y="252" width="10" height="8" rx="2" fill="#0d1117"/>
    <rect x="546" y="252" width="10" height="8" rx="2" fill="#0d1117"/>
    <rect x="476" y="300" width="10" height="8" rx="2" fill="#0d1117"/>
    <rect x="546" y="300" width="10" height="8" rx="2" fill="#0d1117"/>
    <rect x="466" y="256" width="118" height="48" rx="14" fill="url(#card)" stroke="#bc8cff" stroke-width="2"/>
    <rect x="552" y="262" width="10" height="36" rx="4" fill="#bc8cff" fill-opacity="0.35"/>
    <text x="512" y="286" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="700">agent IA</text>
  </g>

  <!-- Red barrier across the lane : build failed -->
  <g>
    <rect x="962" y="266" width="10" height="94" fill="#30363d"/>
    <rect x="1074" y="266" width="10" height="94" fill="#30363d"/>
    <g transform="translate(940 240)">
      <rect x="0" y="0" width="166" height="30" rx="4" fill="#12161d" stroke="#f85149" stroke-width="2"/>
      <path d="M8 26 L30 4 M42 26 L64 4 M76 26 L98 4 M110 26 L132 4 M144 26 L162 8" stroke="#f85149" stroke-width="7"/>
    </g>
    <text x="1023" y="226" text-anchor="middle" fill="#f85149" font-size="15" font-weight="700" letter-spacing="1">BUILD&#160;FAILED</text>
  </g>

  <!-- Transformation strip : warning becomes a barrier -->
  <g>
    <rect x="290" y="432" width="216" height="38" rx="19" fill="url(#card)" stroke="#ffa657" stroke-width="1.5"/>
    <text x="398" y="457" text-anchor="middle" fill="#ffa657" font-size="15" font-family="Consolas, monospace">CA1848 · warning</text>

    <path d="M528 451 H648" stroke="#9198a1" stroke-width="2"/>
    <path d="M648 451 l-10 -6 v12 z" fill="#9198a1"/>
    <text x="588" y="440" text-anchor="middle" fill="#9198a1" font-size="12" font-family="Consolas, monospace">TreatWarningsAsErrors</text>

    <rect x="668" y="432" width="240" height="38" rx="19" fill="#12161d" stroke="#f85149" stroke-width="2"/>
    <text x="788" y="457" text-anchor="middle" fill="#f85149" font-size="15" font-weight="600" font-family="Consolas, monospace">erreur · build failed</text>
  </g>

  <text x="600" y="548" text-anchor="middle" fill="#6e7681" font-size="16" letter-spacing="2">
    LES  CONVENTIONS  QUI  S'APPLIQUENT  SEULES  ·  CONVENTIONS  THAT  ENFORCE  THEMSELVES
  </text>
</svg>
