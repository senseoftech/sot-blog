<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.16"/>
      <stop offset="55%" stop-color="#38bdf8" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c2430"/>
      <stop offset="100%" stop-color="#12161d"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="600" fill="#0d1117"/>
  <rect width="1200" height="600" fill="url(#glow)"/>

  <g stroke="#30363d" stroke-opacity="0.18" stroke-width="1">
    <path d="M0 150 H1200 M0 300 H1200 M0 450 H1200"/>
    <path d="M300 0 V600 M600 0 V600 M900 0 V600"/>
  </g>

  <text x="600" y="62" text-anchor="middle" fill="#38bdf8" font-size="17" letter-spacing="4" font-weight="600">AGENTS.MD&#160;&#160;·&#160;&#160;LE&#160;&#160;CARNET&#160;&#160;D'ACCUEIL&#160;&#160;DE&#160;&#160;L'AGENT</text>

  <!-- The instructions file card -->
  <g>
    <rect x="80" y="120" width="420" height="360" rx="16" fill="url(#card)" stroke="#38bdf8" stroke-width="2"/>
    <text x="110" y="164" fill="#e6edf3" font-size="20" font-weight="700">AGENTS.md</text>
    <rect x="340" y="146" width="130" height="26" rx="13" fill="#12161d" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="405" y="164" text-anchor="middle" fill="#38bdf8" font-size="12" font-weight="600">racine du dépôt</text>

    <text x="110" y="206" fill="#3fb950" font-size="14" font-weight="600" letter-spacing="1">BUILD</text>
    <text x="110" y="230" fill="#9198a1" font-size="13" font-family="Consolas, monospace">dotnet build · dotnet test</text>
    <text x="110" y="250" fill="#9198a1" font-size="13" font-family="Consolas, monospace">docker compose up -d db</text>

    <text x="110" y="290" fill="#38bdf8" font-size="14" font-weight="600" letter-spacing="1">CONVENTIONS</text>
    <text x="110" y="314" fill="#9198a1" font-size="13">CQRS léger — voir ADR-0007</text>
    <text x="110" y="334" fill="#9198a1" font-size="13">l'assuré = Customer (glossaire)</text>

    <text x="110" y="374" fill="#ffa657" font-size="14" font-weight="600" letter-spacing="1">PIÈGES</text>
    <text x="110" y="398" fill="#f85149" font-size="13">TIERS : ne pas renommer</text>
    <text x="110" y="418" fill="#9198a1" font-size="13">appsettings.Dev non versionné</text>

    <text x="110" y="456" fill="#3fb950" font-size="13">✓ fini = build + tests + format</text>
  </g>

  <!-- The daily cycle -->
  <g>
    <circle cx="850" cy="310" r="130" fill="none" stroke="#6e7681" stroke-opacity="0.6" stroke-width="2" stroke-dasharray="6 6"/>

    <path d="M-5,-6 L7,0 L-5,6 Z" fill="#38bdf8" transform="translate(942,218) rotate(45)"/>
    <path d="M-5,-6 L7,0 L-5,6 Z" fill="#38bdf8" transform="translate(942,402) rotate(135)"/>
    <path d="M-5,-6 L7,0 L-5,6 Z" fill="#38bdf8" transform="translate(758,402) rotate(225)"/>
    <path d="M-5,-6 L7,0 L-5,6 Z" fill="#38bdf8" transform="translate(758,218) rotate(315)"/>

    <rect x="770" y="163" width="160" height="34" rx="17" fill="url(#card)" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="850" y="185" text-anchor="middle" fill="#e6edf3" font-size="14" font-weight="600">nouvelle session</text>

    <rect x="905" y="293" width="150" height="34" rx="17" fill="url(#card)" stroke="#3fb950" stroke-width="2"/>
    <text x="980" y="315" text-anchor="middle" fill="#3fb950" font-size="14" font-weight="700">lit AGENTS.md</text>

    <rect x="805" y="423" width="90" height="34" rx="17" fill="url(#card)" stroke="#bc8cff" stroke-width="1.5"/>
    <text x="850" y="445" text-anchor="middle" fill="#e6edf3" font-size="14" font-weight="600">code</text>

    <rect x="655" y="293" width="130" height="34" rx="17" fill="url(#card)" stroke="#f85149" stroke-width="1.5"/>
    <text x="720" y="315" text-anchor="middle" fill="#f85149" font-size="14" font-weight="600">oublie tout</text>

    <text x="850" y="300" text-anchor="middle" fill="#9198a1" font-size="13">l'agent oublie</text>
    <text x="850" y="322" text-anchor="middle" fill="#e6edf3" font-size="14" font-weight="600">le fichier se souvient</text>

    <text x="850" y="500" text-anchor="middle" fill="#9198a1" font-size="14">corrigé deux fois en review = une ligne du fichier</text>
  </g>

  <text x="600" y="548" text-anchor="middle" fill="#6e7681" font-size="16" letter-spacing="2">
    LE  GUIDE  D'ONBOARDING  DE  VOTRE  IA  ·  YOUR  AI'S  ONBOARDING  GUIDE
  </text>
</svg>
