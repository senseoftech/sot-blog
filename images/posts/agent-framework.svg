<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.16"/>
      <stop offset="55%" stop-color="#38bdf8" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c2430"/>
      <stop offset="100%" stop-color="#12161d"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="600" fill="#0d1117"/>
  <rect width="1200" height="600" fill="url(#glow)"/>

  <g stroke="#30363d" stroke-opacity="0.18" stroke-width="1">
    <path d="M0 150 H1200 M0 300 H1200 M0 450 H1200"/>
    <path d="M300 0 V600 M600 0 V600 M900 0 V600"/>
  </g>

  <text x="600" y="62" text-anchor="middle" fill="#38bdf8" font-size="17" letter-spacing="4" font-weight="600">MICROSOFT&#160;&#160;AGENT&#160;&#160;FRAMEWORK</text>

  <!-- Left card: anatomy of an agent -->
  <g>
    <rect x="60" y="104" width="330" height="330" rx="16" fill="url(#card)" stroke="#3fb950" stroke-width="2"/>
    <text x="225" y="150" text-anchor="middle" fill="#e6edf3" font-size="24" font-weight="700">L'AGENT</text>
    <text x="225" y="176" text-anchor="middle" fill="#9198a1" font-size="14">votre employé IA</text>

    <circle cx="110" cy="228" r="10" fill="#38bdf8"/>
    <text x="140" y="226" fill="#e6edf3" font-size="16" font-weight="600">un cerveau</text>
    <text x="140" y="246" fill="#9198a1" font-size="13">le modèle (LLM)</text>

    <rect x="100" y="288" width="20" height="20" rx="3" fill="#ffa657"/>
    <text x="140" y="296" fill="#e6edf3" font-size="16" font-weight="600">une fiche de poste</text>
    <text x="140" y="316" fill="#9198a1" font-size="13">les instructions</text>

    <path d="M100 358 l10 -10 l10 10 l-10 10 z" fill="#bc8cff"/>
    <text x="140" y="366" fill="#e6edf3" font-size="16" font-weight="600">des outils</text>
    <text x="140" y="386" fill="#9198a1" font-size="13">fonctions · MCP · code</text>
  </g>

  <!-- Right: the team graph -->
  <g>
    <rect x="450" y="104" width="690" height="330" rx="16" fill="url(#card)" stroke="#38bdf8" stroke-width="2"/>
    <text x="795" y="150" text-anchor="middle" fill="#e6edf3" font-size="24" font-weight="700">L'ÉQUIPE</text>
    <text x="795" y="176" text-anchor="middle" fill="#9198a1" font-size="14">workflows &amp; orchestrations</text>

    <!-- edges -->
    <g stroke="#38bdf8" stroke-width="2" stroke-opacity="0.55">
      <path d="M795 250 L615 340"/>
      <path d="M795 250 L795 340"/>
      <path d="M795 250 L975 340"/>
    </g>
    <path d="M975 340 L1075 250" stroke="#ffa657" stroke-width="2" stroke-dasharray="6 5"/>

    <!-- manager -->
    <circle cx="795" cy="240" r="30" fill="#1c2430" stroke="#3fb950" stroke-width="3"/>
    <text x="795" y="247" text-anchor="middle" fill="#3fb950" font-size="18" font-weight="700">M</text>
    <text x="795" y="212" text-anchor="middle" fill="#9198a1" font-size="12">manager</text>

    <!-- specialists -->
    <circle cx="615" cy="358" r="24" fill="#1c2430" stroke="#38bdf8" stroke-width="3"/>
    <text x="615" y="365" text-anchor="middle" fill="#38bdf8" font-size="15" font-weight="700">A</text>
    <text x="615" y="404" text-anchor="middle" fill="#9198a1" font-size="12">rédacteur</text>

    <circle cx="795" cy="358" r="24" fill="#1c2430" stroke="#38bdf8" stroke-width="3"/>
    <text x="795" y="365" text-anchor="middle" fill="#38bdf8" font-size="15" font-weight="700">B</text>
    <text x="795" y="404" text-anchor="middle" fill="#9198a1" font-size="12">analyste</text>

    <circle cx="975" cy="358" r="24" fill="#1c2430" stroke="#38bdf8" stroke-width="3"/>
    <text x="975" y="365" text-anchor="middle" fill="#38bdf8" font-size="15" font-weight="700">C</text>
    <text x="975" y="404" text-anchor="middle" fill="#9198a1" font-size="12">juriste</text>

    <!-- human in the loop -->
    <circle cx="1075" cy="240" r="24" fill="#1c2430" stroke="#ffa657" stroke-width="3"/>
    <path d="M1066 240 l6 7 l12 -13" stroke="#ffa657" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="1075" y="204" text-anchor="middle" fill="#ffa657" font-size="12">l'humain valide</text>
  </g>

  <!-- Bottom strip: the five orchestrations -->
  <g>
    <!-- sequential -->
    <g>
      <circle cx="120" cy="486" r="7" fill="#3fb950"/>
      <path d="M132 486 H158" stroke="#6e7681" stroke-width="2"/>
      <circle cx="170" cy="486" r="7" fill="#3fb950"/>
      <path d="M182 486 H208" stroke="#6e7681" stroke-width="2"/>
      <circle cx="220" cy="486" r="7" fill="#3fb950"/>
      <text x="170" y="524" text-anchor="middle" fill="#9198a1" font-size="13">sequential</text>
    </g>
    <!-- concurrent -->
    <g>
      <circle cx="360" cy="466" r="7" fill="#38bdf8"/>
      <circle cx="360" cy="486" r="7" fill="#38bdf8"/>
      <circle cx="360" cy="506" r="7" fill="#38bdf8"/>
      <path d="M375 466 H420 M375 486 H420 M375 506 H420" stroke="#6e7681" stroke-width="2"/>
      <circle cx="432" cy="486" r="7" fill="#38bdf8"/>
      <text x="396" y="540" text-anchor="middle" fill="#9198a1" font-size="13">concurrent</text>
    </g>
    <!-- handoff -->
    <g>
      <circle cx="580" cy="486" r="9" fill="#ffa657"/>
      <path d="M596 486 H638 l-8 -7 M638 486 l-8 7" stroke="#6e7681" stroke-width="2" fill="none"/>
      <circle cx="652" cy="486" r="9" fill="#ffa657"/>
      <text x="616" y="524" text-anchor="middle" fill="#9198a1" font-size="13">handoff</text>
    </g>
    <!-- group chat -->
    <g>
      <circle cx="810" cy="470" r="7" fill="#bc8cff"/>
      <circle cx="840" cy="486" r="7" fill="#bc8cff"/>
      <circle cx="810" cy="502" r="7" fill="#bc8cff"/>
      <circle cx="780" cy="486" r="7" fill="#bc8cff"/>
      <text x="810" y="540" text-anchor="middle" fill="#9198a1" font-size="13">group chat</text>
    </g>
    <!-- magentic -->
    <g>
      <circle cx="1020" cy="486" r="9" fill="#3fb950"/>
      <path d="M1020 477 V456 M1029 486 H1052 M1020 495 V516 M1011 486 H988" stroke="#6e7681" stroke-width="2"/>
      <circle cx="1020" cy="450" r="6" fill="#38bdf8"/>
      <circle cx="1058" cy="486" r="6" fill="#38bdf8"/>
      <circle cx="1020" cy="522" r="6" fill="#38bdf8"/>
      <circle cx="982" cy="486" r="6" fill="#38bdf8"/>
      <text x="1020" y="552" text-anchor="middle" fill="#9198a1" font-size="13">magentic</text>
    </g>
  </g>

  <text x="600" y="584" text-anchor="middle" fill="#6e7681" font-size="16" letter-spacing="2">
    MONTEZ  VOTRE  ÉQUIPE  D'AGENTS  ·  BUILD  YOUR  AGENT  TEAM
  </text>
</svg>
