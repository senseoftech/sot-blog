<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.16"/>
      <stop offset="55%" stop-color="#38bdf8" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c2430"/>
      <stop offset="100%" stop-color="#12161d"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="#0d1117"/>
  <rect width="1200" height="600" fill="url(#glow)"/>
  <g stroke="#30363d" stroke-opacity="0.18" stroke-width="1">
    <path d="M0 150 H1200 M0 300 H1200 M0 450 H1200"/>
    <path d="M300 0 V600 M600 0 V600 M900 0 V600"/>
  </g>
  <rect x="520" y="30" width="160" height="26" rx="13" fill="#0d1117" stroke="#f85149" stroke-width="2"/>
  <text x="600" y="48" text-anchor="middle" fill="#f85149" font-size="13" letter-spacing="3" font-weight="700">NIVEAU 400</text>
  <text x="600" y="86" text-anchor="middle" fill="#e6edf3" font-size="19" letter-spacing="2" font-weight="600">FIABILITÉ DES AGENTS LONGUE DURÉE</text>

  <!-- The crash -->
  <g>
    <rect x="70" y="120" width="470" height="150" rx="14" fill="url(#card)" stroke="#f85149" stroke-width="2"/>
    <text x="305" y="150" text-anchor="middle" fill="#f85149" font-size="15" font-weight="700">LE CRASH AU MAUVAIS MOMENT</text>
    <g font-family="Consolas, monospace" font-size="12.5">
      <text x="96" y="184" fill="#e6edf3">Rembourser(500€) ────► paiement parti ✓</text>
      <text x="96" y="212" fill="#f85149">   💥 crash avant d'enregistrer « c'est fait »</text>
      <text x="96" y="240" fill="#ffa657">reprise → REJOUE → double remboursement</text>
    </g>
    <text x="305" y="262" text-anchor="middle" fill="#9198a1" font-size="11.5">le distribué garantit « au moins une fois »</text>
  </g>

  <!-- Idempotence -->
  <g>
    <rect x="590" y="120" width="550" height="150" rx="14" fill="url(#card)" stroke="#3fb950" stroke-width="2"/>
    <text x="865" y="150" text-anchor="middle" fill="#3fb950" font-size="15" font-weight="700">PILIER 1 · IDEMPOTENCE</text>
    <g font-family="Consolas, monospace" font-size="12.5">
      <text x="616" y="184" fill="#e6edf3">Refund(…, idempotencyKey: "abc")</text>
      <text x="616" y="212" fill="#3fb950">déjà vu "abc" ? → retourne le résultat, ne paie pas</text>
    </g>
    <text x="865" y="248" text-anchor="middle" fill="#e6edf3" font-size="12.5" font-weight="600">responsabilité de L'OUTIL, pas de l'agent</text>
    <text x="865" y="266" text-anchor="middle" fill="#9198a1" font-size="11.5">rendre le rejeu inoffensif, pas espérer qu'il n'arrive pas</text>
  </g>

  <!-- Compensation -->
  <g>
    <rect x="70" y="290" width="470" height="160" rx="14" fill="url(#card)" stroke="#ffa657" stroke-width="2"/>
    <text x="305" y="320" text-anchor="middle" fill="#ffa657" font-size="15" font-weight="700">PILIER 2 · COMPENSATION (saga)</text>
    <g font-size="12.5">
      <rect x="96" y="338" width="120" height="34" rx="6" fill="#14432c" stroke="#3fb950"/>
      <text x="156" y="360" text-anchor="middle" fill="#3fb950">réserver</text>
      <rect x="228" y="338" width="120" height="34" rx="6" fill="#14432c" stroke="#3fb950"/>
      <text x="288" y="360" text-anchor="middle" fill="#3fb950">débiter</text>
      <rect x="360" y="338" width="150" height="34" rx="6" fill="#4d1f24" stroke="#f85149"/>
      <text x="435" y="360" text-anchor="middle" fill="#f85149">expédier ✗</text>
    </g>
    <text x="305" y="400" text-anchor="middle" fill="#e6edf3" font-size="12.5">on ne rollback pas l'irréversible — on compense</text>
    <text x="305" y="424" text-anchor="middle" fill="#9198a1" font-size="11.5">rembourser · relâcher le stock (action inverse)</text>
  </g>

  <!-- Human + SLO -->
  <g>
    <rect x="590" y="290" width="270" height="160" rx="14" fill="url(#card)" stroke="#bc8cff" stroke-width="2"/>
    <text x="725" y="320" text-anchor="middle" fill="#bc8cff" font-size="14" font-weight="700">PILIER 3 · HUMAIN</text>
    <text x="725" y="348" text-anchor="middle" fill="#e6edf3" font-size="12.5">le disjoncteur</text>
    <text x="725" y="374" text-anchor="middle" fill="#9198a1" font-size="12">seuil : montant,</text>
    <text x="725" y="392" text-anchor="middle" fill="#9198a1" font-size="12">irréversibilité,</text>
    <text x="725" y="410" text-anchor="middle" fill="#9198a1" font-size="12">confiance basse</text>
    <text x="725" y="436" text-anchor="middle" fill="#e6edf3" font-size="12">→ escalade</text>

    <rect x="880" y="290" width="260" height="160" rx="14" fill="url(#card)" stroke="#38bdf8" stroke-width="2"/>
    <text x="1010" y="320" text-anchor="middle" fill="#38bdf8" font-size="14" font-weight="700">PILIER 4 · SLO</text>
    <g fill="#e6edf3" font-size="12">
      <text x="906" y="348">· taux de complétion</text>
      <text x="906" y="372">· taux d'escalade</text>
      <text x="906" y="396">· taux de rejeu</text>
      <text x="906" y="420">· coût / latence par tâche</text>
    </g>
    <text x="1010" y="442" text-anchor="middle" fill="#9198a1" font-size="10.5">alimentés par les traces OTel</text>
  </g>

  <text x="600" y="510" text-anchor="middle" fill="#6e7681" font-size="15" letter-spacing="2">CONCEVEZ POUR LE REJEU · COMPENSEZ L'IRRÉVERSIBLE</text>
</svg>
