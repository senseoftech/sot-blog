<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.16"/>
      <stop offset="55%" stop-color="#38bdf8" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c2430"/>
      <stop offset="100%" stop-color="#12161d"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="600" fill="#0d1117"/>
  <rect width="1200" height="600" fill="url(#glow)"/>

  <g stroke="#30363d" stroke-opacity="0.18" stroke-width="1">
    <path d="M0 150 H1200 M0 300 H1200 M0 450 H1200"/>
    <path d="M300 0 V600 M600 0 V600 M900 0 V600"/>
  </g>

  <text x="600" y="62" text-anchor="middle" fill="#38bdf8" font-size="17" letter-spacing="4" font-weight="600">MICROSOFT.EXTENSIONS.AI&#160;&#160;&#183;&#160;&#160;&#201;PISODE&#160;&#160;1/5</text>
  <text x="600" y="100" text-anchor="middle" fill="#e6edf3" font-size="30" font-weight="700">Une interface pour les gouverner tous</text>

  <!-- provider plugs -->
  <g>
    <rect x="80" y="170" width="190" height="54" rx="12" fill="url(#card)" stroke="#38bdf8" stroke-width="1.8"/>
    <text x="175" y="203" text-anchor="middle" fill="#e6edf3" font-size="14.5" font-weight="600">Azure AI Foundry</text>

    <rect x="80" y="238" width="190" height="54" rx="12" fill="url(#card)" stroke="#ffa657" stroke-width="1.8"/>
    <text x="175" y="271" text-anchor="middle" fill="#e6edf3" font-size="14.5" font-weight="600">Anthropic</text>

    <rect x="80" y="306" width="190" height="54" rx="12" fill="url(#card)" stroke="#3fb950" stroke-width="1.8"/>
    <text x="175" y="339" text-anchor="middle" fill="#e6edf3" font-size="14.5" font-weight="600">AWS Bedrock</text>

    <rect x="80" y="374" width="190" height="54" rx="12" fill="url(#card)" stroke="#bc8cff" stroke-width="1.8"/>
    <text x="175" y="407" text-anchor="middle" fill="#e6edf3" font-size="14.5" font-weight="600">Ollama &#183; Foundry Local</text>

    <path d="M270 197 H340 M270 265 H340 M270 333 H340 M270 401 H340" stroke="#6e7681" stroke-width="1.8"/>
    <path d="M340 197 V401" stroke="#6e7681" stroke-width="1.8"/>
    <path d="M340 299 H392" stroke="#6e7681" stroke-width="2.2"/>
    <path d="M384 293 L396 299 L384 305 Z" fill="#6e7681"/>
  </g>

  <!-- the socket -->
  <g>
    <rect x="400" y="240" width="330" height="118" rx="16" fill="url(#card)" stroke="#38bdf8" stroke-width="2.5"/>
    <text x="565" y="288" text-anchor="middle" fill="#38bdf8" font-size="22" font-weight="700" font-family="Consolas, monospace">IChatClient</text>
    <text x="565" y="320" text-anchor="middle" fill="#9198a1" font-size="13" font-family="Consolas, monospace">IEmbeddingGenerator</text>
    <text x="565" y="344" text-anchor="middle" fill="#9198a1" font-size="12">une prise, tous les fournisseurs</text>
  </g>

  <path d="M730 299 H782" stroke="#6e7681" stroke-width="2.2"/>
  <path d="M774 293 L786 299 L774 305 Z" fill="#6e7681"/>

  <!-- pipeline -->
  <g>
    <rect x="790" y="180" width="330" height="240" rx="16" fill="url(#card)" stroke="#3fb950" stroke-width="2"/>
    <text x="955" y="215" text-anchor="middle" fill="#3fb950" font-size="15" font-weight="700">VOTRE PIPELINE</text>
    <rect x="820" y="235" width="270" height="38" rx="8" fill="#12161d" stroke="#30363d" stroke-width="1.5"/>
    <text x="955" y="260" text-anchor="middle" fill="#e6edf3" font-size="13.5" font-family="Consolas, monospace">.UseDistributedCache()</text>
    <rect x="820" y="283" width="270" height="38" rx="8" fill="#12161d" stroke="#30363d" stroke-width="1.5"/>
    <text x="955" y="308" text-anchor="middle" fill="#e6edf3" font-size="13.5" font-family="Consolas, monospace">.UseFunctionInvocation()</text>
    <rect x="820" y="331" width="270" height="38" rx="8" fill="#12161d" stroke="#30363d" stroke-width="1.5"/>
    <text x="955" y="356" text-anchor="middle" fill="#e6edf3" font-size="13.5" font-family="Consolas, monospace">.UseOpenTelemetry()</text>
    <text x="955" y="400" text-anchor="middle" fill="#9198a1" font-size="12">&#233;crit une fois, pour tous les mod&#232;les</text>
  </g>

  <text x="600" y="480" text-anchor="middle" fill="#9198a1" font-size="13.5">le fournisseur devient un d&#233;tail d'injection &#8212; the provider becomes an injection detail</text>

  <text x="600" y="560" text-anchor="middle" fill="#6e7681" font-size="15" letter-spacing="2">MICROSOFT.EXTENSIONS.AI&#160;EN&#160;PRATIQUE&#160;&#183;&#160;HANDS-ON&#160;WITH&#160;MICROSOFT.EXTENSIONS.AI</text>
</svg>
