<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.16"/>
      <stop offset="55%" stop-color="#38bdf8" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c2430"/>
      <stop offset="100%" stop-color="#12161d"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="600" fill="#0d1117"/>
  <rect width="1200" height="600" fill="url(#glow)"/>

  <g stroke="#30363d" stroke-opacity="0.18" stroke-width="1">
    <path d="M0 150 H1200 M0 300 H1200 M0 450 H1200"/>
    <path d="M300 0 V600 M600 0 V600 M900 0 V600"/>
  </g>

  <text x="600" y="62" text-anchor="middle" fill="#38bdf8" font-size="17" letter-spacing="4" font-weight="600">PLAN&#160;&#160;·&#160;&#160;LE&#160;&#160;POINT&#160;&#160;DE&#160;&#160;CONTRÔLE&#160;&#160;HUMAIN</text>

  <!-- The plan document -->
  <g>
    <rect x="90" y="105" width="420" height="380" rx="16" fill="url(#card)" stroke="#38bdf8" stroke-width="2"/>
    <text x="120" y="150" fill="#e6edf3" font-size="20" font-weight="700">PLAN</text>
    <text x="490" y="150" text-anchor="end" fill="#9198a1" font-size="13">docs/plans/pagination.md</text>

    <text x="120" y="188" fill="#38bdf8" font-size="14" font-weight="600" letter-spacing="1">ÉTAPES</text>

    <!-- step 1 : checked -->
    <rect x="120" y="202" width="20" height="20" rx="5" fill="#12161d" stroke="#3fb950" stroke-width="2"/>
    <path d="M124 212 l5 5 l8 -10" stroke="#3fb950" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <text x="154" y="218" fill="#e6edf3" font-size="14" font-weight="600">1.</text>
    <rect x="176" y="208" width="270" height="9" rx="4" fill="#21262d"/>

    <!-- step 2 : checked -->
    <rect x="120" y="236" width="20" height="20" rx="5" fill="#12161d" stroke="#3fb950" stroke-width="2"/>
    <path d="M124 246 l5 5 l8 -10" stroke="#3fb950" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <text x="154" y="252" fill="#e6edf3" font-size="14" font-weight="600">2.</text>
    <rect x="176" y="242" width="230" height="9" rx="4" fill="#21262d"/>

    <!-- step 3 : empty -->
    <rect x="120" y="270" width="20" height="20" rx="5" fill="#12161d" stroke="#6e7681" stroke-width="2"/>
    <text x="154" y="286" fill="#e6edf3" font-size="14" font-weight="600">3.</text>
    <rect x="176" y="276" width="250" height="9" rx="4" fill="#21262d"/>

    <!-- step 4 : empty -->
    <rect x="120" y="304" width="20" height="20" rx="5" fill="#12161d" stroke="#6e7681" stroke-width="2"/>
    <text x="154" y="320" fill="#e6edf3" font-size="14" font-weight="600">4.</text>
    <rect x="176" y="310" width="190" height="9" rx="4" fill="#21262d"/>

    <text x="120" y="360" fill="#ffa657" font-size="14" font-weight="600" letter-spacing="1">RISQUES</text>
    <rect x="120" y="370" width="280" height="8" rx="4" fill="#21262d"/>

    <text x="120" y="408" fill="#f85149" font-size="14" font-weight="600" letter-spacing="1">HORS PÉRIMÈTRE</text>
    <rect x="120" y="418" width="240" height="8" rx="4" fill="#21262d"/>

    <!-- stamp : validated by the human -->
    <g transform="rotate(-10 385 442)">
      <rect x="270" y="418" width="230" height="48" rx="10" fill="#12161d" fill-opacity="0.85" stroke="#3fb950" stroke-width="3"/>
      <text x="385" y="448" text-anchor="middle" fill="#3fb950" font-size="16" font-weight="700" letter-spacing="1">VALIDÉ PAR L'HUMAIN</text>
    </g>
  </g>

  <!-- Arrow plan -> code -->
  <g>
    <path d="M540 295 H636" stroke="#3fb950" stroke-width="3" fill="none"/>
    <path d="M628 283 L650 295 L628 307 Z" fill="#3fb950"/>
    <text x="595" y="272" text-anchor="middle" fill="#9198a1" font-size="13">puis</text>
  </g>

  <!-- Code blocks : the agent codes, after -->
  <g>
    <text x="895" y="150" text-anchor="middle" fill="#e6edf3" font-size="18" font-weight="600">l'agent code — après</text>
    <text x="895" y="176" text-anchor="middle" fill="#9198a1" font-size="13">chaque étape compile et passe les tests</text>

    <rect x="690" y="200" width="410" height="76" rx="12" fill="url(#card)" stroke="#30363d" stroke-width="1.5"/>
    <circle cx="716" cy="222" r="5" fill="#3fb950"/>
    <rect x="732" y="217" width="120" height="9" rx="4" fill="#bc8cff" fill-opacity="0.7"/>
    <rect x="732" y="238" width="290" height="8" rx="4" fill="#21262d"/>
    <rect x="732" y="254" width="230" height="8" rx="4" fill="#21262d"/>

    <rect x="690" y="292" width="410" height="76" rx="12" fill="url(#card)" stroke="#30363d" stroke-width="1.5"/>
    <circle cx="716" cy="314" r="5" fill="#3fb950"/>
    <rect x="732" y="309" width="150" height="9" rx="4" fill="#38bdf8" fill-opacity="0.7"/>
    <rect x="732" y="330" width="260" height="8" rx="4" fill="#21262d"/>
    <rect x="732" y="346" width="300" height="8" rx="4" fill="#21262d"/>

    <rect x="690" y="384" width="410" height="76" rx="12" fill="url(#card)" stroke="#30363d" stroke-width="1.5"/>
    <circle cx="716" cy="406" r="5" fill="#6e7681"/>
    <rect x="732" y="401" width="130" height="9" rx="4" fill="#ffa657" fill-opacity="0.7"/>
    <rect x="732" y="422" width="270" height="8" rx="4" fill="#21262d"/>
    <rect x="732" y="438" width="200" height="8" rx="4" fill="#21262d"/>
  </g>

  <!-- Counter -->
  <g>
    <rect x="325" y="488" width="550" height="34" rx="17" fill="#12161d" stroke="#30363d" stroke-width="1.5"/>
    <text x="600" y="510" text-anchor="middle" font-size="15">
      <tspan fill="#3fb950" font-weight="600">relire le plan : 2 min</tspan>
      <tspan fill="#6e7681">&#160;&#160;·&#160;&#160;</tspan>
      <tspan fill="#f85149" font-weight="600">relire le diff : 2 h</tspan>
    </text>
  </g>

  <text x="600" y="548" text-anchor="middle" fill="#6e7681" font-size="16" letter-spacing="2">
    LE  DEVIS  AVANT  LES  TRAVAUX  ·  THE  QUOTE  BEFORE  THE  WORK
  </text>
</svg>
