<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.16"/>
      <stop offset="55%" stop-color="#38bdf8" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c2430"/>
      <stop offset="100%" stop-color="#12161d"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="#0d1117"/>
  <rect width="1200" height="600" fill="url(#glow)"/>
  <g stroke="#30363d" stroke-opacity="0.18" stroke-width="1">
    <path d="M0 150 H1200 M0 300 H1200 M0 450 H1200"/>
    <path d="M300 0 V600 M600 0 V600 M900 0 V600"/>
  </g>
  <text x="600" y="60" text-anchor="middle" fill="#38bdf8" font-size="17" letter-spacing="4" font-weight="600">ASPIRE&#160;&#160;·&#160;&#160;L'ÉCHAFAUDAGE</text>

  <!-- AppHost orchestrating -->
  <g>
    <rect x="420" y="110" width="360" height="90" rx="14" fill="#0d1117" stroke="#3fb950" stroke-width="3"/>
    <text x="600" y="146" text-anchor="middle" fill="#3fb950" font-size="17" font-weight="700">AppHost — la topologie en C#</text>
    <text x="600" y="172" text-anchor="middle" fill="#9198a1" font-size="12" font-family="Consolas, monospace">AddRedis · AddPostgres · AddProject · WithReference</text>

    <g stroke="#3fb950" stroke-width="2" stroke-opacity="0.6">
      <path d="M480 200 L220 268"/>
      <path d="M540 200 L480 268"/>
      <path d="M660 200 L720 268"/>
      <path d="M720 200 L980 268"/>
    </g>

    <rect x="120" y="268" width="200" height="80" rx="12" fill="url(#card)" stroke="#38bdf8" stroke-width="2"/>
    <text x="220" y="300" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="600">API</text>
    <text x="220" y="324" text-anchor="middle" fill="#9198a1" font-size="11">Orders.Api</text>

    <rect x="380" y="268" width="200" height="80" rx="12" fill="url(#card)" stroke="#38bdf8" stroke-width="2"/>
    <text x="480" y="300" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="600">Front</text>
    <text x="480" y="324" text-anchor="middle" fill="#9198a1" font-size="11">Web.Front</text>

    <rect x="620" y="268" width="200" height="80" rx="12" fill="url(#card)" stroke="#bc8cff" stroke-width="2"/>
    <text x="720" y="300" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="600">Redis</text>
    <text x="720" y="324" text-anchor="middle" fill="#9198a1" font-size="11">conteneur, provisionné</text>

    <rect x="880" y="268" width="200" height="80" rx="12" fill="url(#card)" stroke="#bc8cff" stroke-width="2"/>
    <text x="980" y="300" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="600">Postgres</text>
    <text x="980" y="324" text-anchor="middle" fill="#9198a1" font-size="11">conteneur, provisionné</text>

    <text x="600" y="392" text-anchor="middle" fill="#9198a1" font-size="13">service discovery : les câbles se branchent seuls · dashboard : la salle de contrôle OTel</text>
  </g>

  <!-- The test -->
  <g>
    <rect x="140" y="420" width="920" height="100" rx="14" fill="url(#card)" stroke="#ffa657" stroke-width="2"/>
    <text x="600" y="452" text-anchor="middle" fill="#ffa657" font-size="15" font-weight="700">LE TEST — un seul oui suffit :</text>
    <text x="600" y="480" text-anchor="middle" fill="#e6edf3" font-size="13">plusieurs services qui se parlent ? · dépendances conteneurisées ? · traces inter-services ?</text>
    <text x="600" y="504" text-anchor="middle" fill="#9198a1" font-size="12">monolithe + une base = non — l'échafaudage autour d'une cabane</text>
  </g>

  <text x="600" y="560" text-anchor="middle" fill="#6e7681" font-size="16" letter-spacing="2">
    L'ÉCHAFAUDAGE  QUI  SE  JUSTIFIE  ·  SCAFFOLDING  THAT  EARNS  ITS  KEEP
  </text>
</svg>
