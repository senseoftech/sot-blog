<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.16"/>
      <stop offset="55%" stop-color="#38bdf8" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c2430"/>
      <stop offset="100%" stop-color="#12161d"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="600" fill="#0d1117"/>
  <rect width="1200" height="600" fill="url(#glow)"/>

  <g stroke="#30363d" stroke-opacity="0.18" stroke-width="1">
    <path d="M0 150 H1200 M0 300 H1200 M0 450 H1200"/>
    <path d="M300 0 V600 M600 0 V600 M900 0 V600"/>
  </g>

  <text x="600" y="62" text-anchor="middle" fill="#38bdf8" font-size="17" letter-spacing="4" font-weight="600">SCHÉMAS&#160;&#160;·&#160;&#160;CONTRATS&#160;&#160;MACHINE-VÉRIFIABLES</text>

  <!-- The OpenAPI document: the template of the connector -->
  <g>
    <rect x="505" y="92" width="190" height="126" rx="12" fill="url(#card)" stroke="#bc8cff" stroke-width="2"/>
    <text x="525" y="122" fill="#e6edf3" font-size="16" font-weight="700">openapi.yaml</text>
    <text x="525" y="150" fill="#9198a1" font-size="12" font-family="Consolas, monospace">required: [amount]</text>
    <text x="525" y="170" fill="#9198a1" font-size="12" font-family="Consolas, monospace">enum: [damaged, late]</text>
    <text x="525" y="190" fill="#9198a1" font-size="12" font-family="Consolas, monospace">additionalProperties: false</text>
    <text x="600" y="244" text-anchor="middle" fill="#bc8cff" font-size="13">le gabarit du connecteur</text>
    <path d="M545 218 L505 300" stroke="#bc8cff" stroke-width="1.5" stroke-dasharray="5 4" stroke-opacity="0.7"/>
    <path d="M655 218 L695 300" stroke="#bc8cff" stroke-width="1.5" stroke-dasharray="5 4" stroke-opacity="0.7"/>
  </g>

  <!-- Agent card with plug -->
  <g>
    <rect x="100" y="270" width="280" height="150" rx="16" fill="url(#card)" stroke="#38bdf8" stroke-width="2"/>
    <text x="240" y="330" text-anchor="middle" fill="#e6edf3" font-size="22" font-weight="700">AGENT&#160;IA</text>
    <text x="240" y="358" text-anchor="middle" fill="#9198a1" font-size="13">lit le schéma, génère l'appel</text>
    <path d="M380 345 H455" stroke="#38bdf8" stroke-width="3"/>
    <rect x="455" y="317" width="68" height="56" rx="8" fill="url(#card)" stroke="#38bdf8" stroke-width="2"/>
  </g>

  <!-- API card with socket -->
  <g>
    <rect x="820" y="270" width="280" height="150" rx="16" fill="url(#card)" stroke="#3fb950" stroke-width="2"/>
    <text x="960" y="330" text-anchor="middle" fill="#e6edf3" font-size="22" font-weight="700">API</text>
    <text x="960" y="358" text-anchor="middle" fill="#9198a1" font-size="13">amount : int · reason : enum</text>
    <path d="M673 345 H820" stroke="#3fb950" stroke-width="3"/>
    <rect x="597" y="307" width="76" height="76" rx="8" fill="#12161d" stroke="#3fb950" stroke-width="2"/>
    <rect x="607" y="328" width="44" height="14" rx="3" fill="#0d1117" stroke="#3fb950" stroke-width="1"/>
    <rect x="607" y="350" width="44" height="14" rx="3" fill="#0d1117" stroke="#3fb950" stroke-width="1"/>
  </g>

  <!-- Prongs, inserted -->
  <rect x="523" y="330" width="118" height="10" rx="3" fill="#38bdf8"/>
  <rect x="523" y="352" width="118" height="10" rx="3" fill="#38bdf8"/>

  <text x="600" y="412" text-anchor="middle" fill="#3fb950" font-size="14" font-weight="600">✓ s'emboîte du premier coup — conforme au schéma</text>

  <!-- The wrong plug, rejected -->
  <g>
    <rect x="400" y="458" width="46" height="36" rx="6" fill="#12161d" stroke="#f85149" stroke-width="1.5"/>
    <rect x="446" y="462" width="26" height="6" rx="2" fill="#f85149" fill-opacity="0.8"/>
    <rect x="446" y="473" width="26" height="6" rx="2" fill="#f85149" fill-opacity="0.8"/>
    <rect x="446" y="484" width="26" height="6" rx="2" fill="#f85149" fill-opacity="0.8"/>
    <path d="M392 450 L480 502 M480 450 L392 502" stroke="#f85149" stroke-width="3" stroke-linecap="round"/>
    <text x="508" y="479" fill="#f85149" font-size="15" font-weight="600">champ inventé&#160;&#160;→&#160;&#160;rejeté</text>
    <text x="508" y="500" fill="#9198a1" font-size="12">arrêté par le compilateur, pas par la prod</text>
  </g>

  <text x="600" y="548" text-anchor="middle" fill="#6e7681" font-size="16" letter-spacing="2">
    LE  CONTEXTE  QUI  SE  VALIDE  ·  CONTEXT  THAT  VALIDATES  ITSELF
  </text>
</svg>
