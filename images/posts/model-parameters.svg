<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.16"/>
      <stop offset="55%" stop-color="#38bdf8" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c2430"/>
      <stop offset="100%" stop-color="#12161d"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="#0d1117"/>
  <rect width="1200" height="600" fill="url(#glow)"/>
  <g stroke="#30363d" stroke-opacity="0.18" stroke-width="1">
    <path d="M0 150 H1200 M0 300 H1200 M0 450 H1200"/>
    <path d="M300 0 V600 M600 0 V600 M900 0 V600"/>
  </g>

  <text x="600" y="62" text-anchor="middle" fill="#38bdf8" font-size="17" letter-spacing="4" font-weight="600">LES&#160;&#160;PARAMÈTRES&#160;&#160;DES&#160;&#160;MODÈLES</text>
  <text x="600" y="90" text-anchor="middle" fill="#9198a1" font-size="14">la table de mixage du prompt — chaque bouton fait UNE chose</text>

  <!-- Console body -->
  <rect x="70" y="118" width="1060" height="352" rx="16" fill="url(#card)" stroke="#30363d" stroke-width="2"/>

  <!-- Fader helper: label on top, track, knob, value bottom -->
  <!-- Group: HASARD (green) -->
  <text x="235" y="150" text-anchor="middle" fill="#3fb950" font-size="12" letter-spacing="2" font-weight="700">HASARD — choisir UN seul</text>
  <line x1="110" y1="162" x2="360" y2="162" stroke="#3fb950" stroke-opacity="0.4"/>
  <!-- temperature -->
  <g>
    <text x="150" y="184" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="600">temperature</text>
    <rect x="144" y="196" width="12" height="180" rx="6" fill="#21262d"/>
    <rect x="138" y="250" width="24" height="14" rx="4" fill="#3fb950"/>
    <text x="150" y="400" text-anchor="middle" fill="#9198a1" font-size="11">largeur de la pioche</text>
  </g>
  <!-- top_p -->
  <g>
    <text x="255" y="184" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="600">top_p</text>
    <rect x="249" y="196" width="12" height="180" rx="6" fill="#21262d"/>
    <rect x="243" y="300" width="24" height="14" rx="4" fill="#3fb950"/>
    <text x="255" y="400" text-anchor="middle" fill="#9198a1" font-size="11">couper la traîne</text>
  </g>
  <!-- top_k / min_p small -->
  <g>
    <text x="340" y="184" text-anchor="middle" fill="#6e7681" font-size="12">top_k · min_p</text>
    <rect x="334" y="196" width="10" height="180" rx="5" fill="#21262d"/>
    <rect x="330" y="330" width="18" height="12" rx="4" fill="#3fb950" fill-opacity="0.5"/>
    <text x="340" y="400" text-anchor="middle" fill="#6e7681" font-size="10">modèles ouverts</text>
  </g>

  <!-- Group: LONGUEUR + RÉPÉTITION (orange) -->
  <text x="500" y="150" text-anchor="middle" fill="#ffa657" font-size="12" letter-spacing="2" font-weight="700">LONGUEUR &amp; RÉPÉTITION</text>
  <line x1="400" y1="162" x2="600" y2="162" stroke="#ffa657" stroke-opacity="0.4"/>
  <g>
    <text x="440" y="184" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="600">max_tokens</text>
    <rect x="434" y="196" width="12" height="180" rx="6" fill="#21262d"/>
    <rect x="428" y="220" width="24" height="14" rx="4" fill="#ffa657"/>
    <text x="440" y="400" text-anchor="middle" fill="#9198a1" font-size="11">tronque, ne résume pas</text>
  </g>
  <g>
    <text x="545" y="184" text-anchor="middle" fill="#e6edf3" font-size="12.5" font-weight="600">frequency /</text>
    <text x="545" y="199" text-anchor="middle" fill="#e6edf3" font-size="12.5" font-weight="600">presence</text>
    <rect x="539" y="208" width="12" height="168" rx="6" fill="#21262d"/>
    <rect x="533" y="352" width="24" height="14" rx="4" fill="#ffa657"/>
    <text x="545" y="400" text-anchor="middle" fill="#9198a1" font-size="11">contre le radotage</text>
  </g>

  <!-- Group: CONTRÔLE (purple) rotary knobs -->
  <text x="740" y="150" text-anchor="middle" fill="#bc8cff" font-size="12" letter-spacing="2" font-weight="700">CONTRÔLE</text>
  <line x1="640" y1="162" x2="840" y2="162" stroke="#bc8cff" stroke-opacity="0.4"/>
  <g>
    <circle cx="680" cy="230" r="30" fill="#12161d" stroke="#bc8cff" stroke-width="2"/>
    <line x1="680" y1="230" x2="700" y2="214" stroke="#bc8cff" stroke-width="3" stroke-linecap="round"/>
    <text x="680" y="284" text-anchor="middle" fill="#e6edf3" font-size="12.5" font-weight="600">stop</text>
    <text x="680" y="302" text-anchor="middle" fill="#9198a1" font-size="10">coupe net</text>
  </g>
  <g>
    <circle cx="760" cy="230" r="30" fill="#12161d" stroke="#bc8cff" stroke-width="2"/>
    <line x1="760" y1="230" x2="744" y2="212" stroke="#bc8cff" stroke-width="3" stroke-linecap="round"/>
    <text x="760" y="284" text-anchor="middle" fill="#e6edf3" font-size="12.5" font-weight="600">seed</text>
    <text x="760" y="302" text-anchor="middle" fill="#9198a1" font-size="10">best-effort</text>
  </g>
  <g>
    <circle cx="680" cy="360" r="26" fill="#12161d" stroke="#bc8cff" stroke-width="2"/>
    <line x1="680" y1="360" x2="695" y2="348" stroke="#bc8cff" stroke-width="3" stroke-linecap="round"/>
    <text x="680" y="408" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="600">n</text>
  </g>
  <g>
    <circle cx="760" cy="360" r="26" fill="#12161d" stroke="#bc8cff" stroke-width="2"/>
    <line x1="760" y1="360" x2="748" y2="345" stroke="#bc8cff" stroke-width="3" stroke-linecap="round"/>
    <text x="760" y="408" text-anchor="middle" fill="#6e7681" font-size="11">logit_bias</text>
  </g>

  <!-- Group: STRUCTURE & RÉFLEXION (blue) -->
  <text x="985" y="150" text-anchor="middle" fill="#38bdf8" font-size="12" letter-spacing="2" font-weight="700">STRUCTURE &amp; RÉFLEXION</text>
  <line x1="870" y1="162" x2="1100" y2="162" stroke="#38bdf8" stroke-opacity="0.4"/>
  <g>
    <rect x="890" y="190" width="180" height="70" rx="10" fill="#12161d" stroke="#38bdf8" stroke-width="2"/>
    <text x="980" y="220" text-anchor="middle" fill="#38bdf8" font-size="13" font-weight="700">response_format</text>
    <text x="980" y="242" text-anchor="middle" fill="#9198a1" font-size="11">JSON par construction</text>
  </g>
  <g>
    <text x="980" y="292" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="600">reasoning_effort</text>
    <rect x="900" y="304" width="160" height="10" rx="5" fill="#21262d"/>
    <rect x="900" y="304" width="70" height="10" rx="5" fill="#38bdf8"/>
    <text x="905" y="336" fill="#9198a1" font-size="10">bas · rapide</text>
    <text x="1055" y="336" text-anchor="end" fill="#9198a1" font-size="10">haut · profond</text>
    <text x="980" y="400" text-anchor="middle" fill="#9198a1" font-size="11">doser combien il « réfléchit »</text>
  </g>

  <!-- Bottom rule strip -->
  <rect x="90" y="430" width="1020" height="28" rx="8" fill="#0d1117" stroke="#f85149" stroke-width="1.5"/>
  <text x="600" y="449" text-anchor="middle" fill="#f85149" font-size="12.5" font-weight="600">la règle d'or : ne poussez pas temperature ET top_p — un bon mix touche 3 boutons, pas 30</text>

  <text x="600" y="502" text-anchor="middle" fill="#6e7681" font-size="16" letter-spacing="2">
    PAR DÉFAUT C'EST BON · ON RÈGLE AVEC DES ÉVALS · TUNE WITH EVALS
  </text>
</svg>
