<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.16"/>
      <stop offset="55%" stop-color="#38bdf8" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c2430"/>
      <stop offset="100%" stop-color="#12161d"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 Z" fill="#ffa657"/>
    </marker>
  </defs>

  <rect width="1200" height="600" fill="#0d1117"/>
  <rect width="1200" height="600" fill="url(#glow)"/>

  <g stroke="#30363d" stroke-opacity="0.18" stroke-width="1">
    <path d="M0 150 H1200 M0 300 H1200 M0 450 H1200"/>
    <path d="M300 0 V600 M600 0 V600 M900 0 V600"/>
  </g>

  <text x="600" y="62" text-anchor="middle" fill="#38bdf8" font-size="17" letter-spacing="4" font-weight="600">RUNBOOKS&#160;&#160;&#38;&#160;&#160;POSTMORTEMS&#160;&#160;·&#160;&#160;LE&#160;&#160;SAVOIR&#160;&#160;OPÉRATIONNEL</text>

  <!-- The runbook checklist card -->
  <g>
    <rect x="80" y="110" width="430" height="380" rx="16" fill="url(#card)" stroke="#38bdf8" stroke-width="2"/>
    <text x="110" y="156" fill="#e6edf3" font-size="20" font-weight="700">RUNBOOK</text>
    <rect x="380" y="134" width="100" height="28" rx="14" fill="#12161d" stroke="#f85149" stroke-width="1.5"/>
    <text x="430" y="153" text-anchor="middle" fill="#f85149" font-size="13" font-weight="600">API 503</text>
    <text x="110" y="182" fill="#9198a1" font-size="13">docs/runbooks/api-503.md — la check-list du pilote</text>

    <!-- step 1 -->
    <rect x="110" y="204" width="22" height="22" rx="6" fill="#12161d" stroke="#3fb950" stroke-width="2"/>
    <path d="M115 215 L120 220 L128 209" stroke="#3fb950" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <text x="146" y="221" fill="#e6edf3" font-size="15">1. Confirmer le 503 (curl /health)</text>

    <!-- step 2 -->
    <rect x="110" y="244" width="22" height="22" rx="6" fill="#12161d" stroke="#3fb950" stroke-width="2"/>
    <path d="M115 255 L120 260 L128 249" stroke="#3fb950" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <text x="146" y="261" fill="#e6edf3" font-size="15">2. Signature « max pool size » dans les logs</text>

    <!-- step 3 -->
    <rect x="110" y="284" width="22" height="22" rx="6" fill="#12161d" stroke="#3fb950" stroke-width="2"/>
    <path d="M115 295 L120 300 L128 289" stroke="#3fb950" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <text x="146" y="301" fill="#e6edf3" font-size="15">3. Sessions SQL dormantes : <tspan fill="#f85149" font-weight="600">82 / 100</tspan></text>

    <!-- step 4 (in progress) -->
    <rect x="110" y="324" width="22" height="22" rx="6" fill="#12161d" stroke="#ffa657" stroke-width="2"/>
    <circle cx="121" cy="335" r="4" fill="#ffa657"/>
    <text x="146" y="341" fill="#ffa657" font-size="15" font-weight="600">4. kubectl rollout restart deploy/api</text>

    <!-- step 5 (pending) -->
    <rect x="110" y="364" width="22" height="22" rx="6" fill="#12161d" stroke="#6e7681" stroke-width="2"/>
    <text x="146" y="381" fill="#9198a1" font-size="15">5. Escalade si récidive sous 30 min</text>

    <text x="110" y="428" fill="#9198a1" font-size="13">on ne réfléchit pas à 3 h du matin :</text>
    <text x="110" y="448" fill="#e6edf3" font-size="14" font-weight="600">on déroule.</text>
  </g>

  <!-- Clock at 03:12 -->
  <g>
    <circle cx="690" cy="212" r="64" fill="url(#card)" stroke="#30363d" stroke-width="2"/>
    <g stroke="#6e7681" stroke-width="2">
      <path d="M690 154 V164"/>
      <path d="M748 212 H738"/>
      <path d="M690 270 V260"/>
      <path d="M632 212 H642"/>
    </g>
    <path d="M690 212 L723 216" stroke="#e6edf3" stroke-width="4" stroke-linecap="round"/>
    <path d="M690 212 L739 196" stroke="#38bdf8" stroke-width="3" stroke-linecap="round"/>
    <circle cx="690" cy="212" r="4" fill="#e6edf3"/>
    <text x="690" y="306" text-anchor="middle" fill="#38bdf8" font-size="18" font-weight="700" letter-spacing="2">03:12</text>
  </g>

  <!-- Incident badge -->
  <g>
    <rect x="800" y="160" width="320" height="52" rx="26" fill="#12161d" stroke="#f85149" stroke-width="2"/>
    <circle cx="832" cy="186" r="7" fill="#f85149"/>
    <text x="972" y="193" text-anchor="middle" fill="#f85149" font-size="16" font-weight="700" letter-spacing="2">INCIDENT&#160;&#160;—&#160;&#160;SEV&#160;2</text>
    <text x="960" y="244" text-anchor="middle" fill="#9198a1" font-size="13">alerte api-http-5xx · l'API répond 503</text>
  </g>

  <!-- Postmortem card -->
  <g>
    <rect x="620" y="330" width="500" height="150" rx="16" fill="url(#card)" stroke="#bc8cff" stroke-width="2"/>
    <text x="650" y="368" fill="#e6edf3" font-size="18" font-weight="700">POSTMORTEM <tspan fill="#9198a1" font-weight="400" font-size="14">— blameless</tspan></text>
    <text x="650" y="400" fill="#9198a1" font-size="14">chronologie · <tspan fill="#ffa657">cause racine : fuite de connexions SQL</tspan></text>
    <text x="650" y="428" fill="#3fb950" font-size="14">→ action : runbook mis à jour (responsable + échéance)</text>
    <text x="650" y="456" fill="#9198a1" font-size="13">l'IA propose · l'humain tranche · le dépôt mémorise</text>
  </g>

  <!-- Loop arrow back to the runbook -->
  <path d="M618 442 Q550 470 522 418" stroke="#ffa657" stroke-width="2" stroke-dasharray="5 4" fill="none" marker-end="url(#arrow)"/>
  <text x="640" y="516" text-anchor="middle" fill="#ffa657" font-size="14" font-weight="600">chaque incident améliore la check-list</text>

  <text x="600" y="548" text-anchor="middle" fill="#6e7681" font-size="16" letter-spacing="2">
    LA  MÉMOIRE  DES  NUITS  BLANCHES  ·  THE  MEMORY  OF  SLEEPLESS  NIGHTS
  </text>
</svg>
