<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.16"/>
      <stop offset="55%" stop-color="#38bdf8" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c2430"/>
      <stop offset="100%" stop-color="#12161d"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="600" fill="#0d1117"/>
  <rect width="1200" height="600" fill="url(#glow)"/>

  <g stroke="#30363d" stroke-opacity="0.18" stroke-width="1">
    <path d="M0 150 H1200 M0 300 H1200 M0 450 H1200"/>
    <path d="M300 0 V600 M600 0 V600 M900 0 V600"/>
  </g>

  <text x="600" y="62" text-anchor="middle" fill="#38bdf8" font-size="17" letter-spacing="4" font-weight="600">TRUNK-BASED&#160;&#160;·&#160;&#160;UNE&#160;&#160;BRANCHE&#160;&#160;PAR&#160;&#160;AGENT</text>

  <!-- main trunk -->
  <path d="M90 300 H1110" stroke="#38bdf8" stroke-width="5" stroke-linecap="round"/>
  <text x="112" y="336" fill="#38bdf8" font-size="16" font-weight="700" font-family="Consolas, monospace">main</text>

  <g fill="#38bdf8">
    <circle cx="150" cy="300" r="9"/>
    <circle cx="390" cy="300" r="9"/>
    <circle cx="620" cy="300" r="9"/>
    <circle cx="850" cy="300" r="9"/>
    <circle cx="1060" cy="300" r="9"/>
  </g>

  <!-- human branch above -->
  <g>
    <path d="M150 300 C 200 300 200 210 250 210 H330 C 380 210 380 300 390 300" stroke="#3fb950" stroke-width="3.5" fill="none"/>
    <circle cx="250" cy="210" r="8" fill="#3fb950"/>
    <circle cx="330" cy="210" r="8" fill="#3fb950"/>
    <text x="290" y="184" text-anchor="middle" fill="#3fb950" font-size="14" font-family="Consolas, monospace">feat/filtre-prix</text>
    <text x="290" y="160" text-anchor="middle" fill="#9198a1" font-size="12">humain</text>
  </g>

  <!-- agent branch above -->
  <g>
    <path d="M620 300 C 670 300 670 200 720 200 H800 C 850 200 850 300 850 300" stroke="#bc8cff" stroke-width="3.5" fill="none"/>
    <circle cx="720" cy="200" r="8" fill="#bc8cff"/>
    <circle cx="800" cy="200" r="8" fill="#bc8cff"/>
    <text x="760" y="174" text-anchor="middle" fill="#bc8cff" font-size="14" font-family="Consolas, monospace">copilot/fix-tva</text>
    <text x="760" y="150" text-anchor="middle" fill="#9198a1" font-size="12">agent · revue obligatoire</text>
  </g>

  <!-- agent branches below -->
  <g>
    <path d="M390 300 C 430 300 430 390 470 390 H540 C 590 390 590 300 620 300" stroke="#ffa657" stroke-width="3.5" fill="none"/>
    <circle cx="470" cy="390" r="8" fill="#ffa657"/>
    <circle cx="540" cy="390" r="8" fill="#ffa657"/>
    <text x="505" y="424" text-anchor="middle" fill="#ffa657" font-size="14" font-family="Consolas, monospace">copilot/i18n-fr</text>
  </g>
  <g>
    <path d="M850 300 C 890 300 890 390 930 390 H990 C 1035 390 1035 300 1060 300" stroke="#ffa657" stroke-width="3.5" fill="none"/>
    <circle cx="930" cy="390" r="8" fill="#ffa657"/>
    <circle cx="990" cy="390" r="8" fill="#ffa657"/>
    <text x="960" y="424" text-anchor="middle" fill="#ffa657" font-size="14" font-family="Consolas, monospace">copilot/docs-adr</text>
  </g>

  <!-- PR airlock -->
  <g>
    <rect x="330" y="234" width="120" height="30" rx="15" fill="#12161d" stroke="#3fb950" stroke-width="1.5"/>
    <text x="390" y="254" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="600">PR + revue &#10003;</text>
    <rect x="790" y="234" width="120" height="30" rx="15" fill="#12161d" stroke="#3fb950" stroke-width="1.5"/>
    <text x="850" y="254" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="600">PR + revue &#10003;</text>
  </g>

  <text x="600" y="480" text-anchor="middle" fill="#9198a1" font-size="15">des branches courtes · une issue = une branche = une PR · la PR est le sas</text>

  <text x="600" y="548" text-anchor="middle" fill="#6e7681" font-size="16" letter-spacing="2">
    GIT  À  L'ÈRE  DES  AGENTS  ·  GIT  IN  THE  AGENT  ERA
  </text>
</svg>
