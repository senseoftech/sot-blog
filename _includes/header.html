<header class="site-header">
    <div class="wrap header-inner">
        <a class="site-brand" href="{{ site.baseurl }}/">
            <span class="brand-prompt">~/</span>senseof.tech<span class="brand-cursor" aria-hidden="true"></span>
        </a>
        <nav class="site-nav" aria-label="Main navigation">
            {% for item in site.navigation %}
            <a href="{{ item.url | prepend: site.baseurl }}" {% if item.i18n %}data-i18n="{{ item.i18n }}"{% endif %} {% if page.url == item.url %}class="is-active" aria-current="page"{% endif %}>{{ item.text }}</a>
            {% endfor %}
        </nav>
        <div class="header-actions">
            <button class="icon-button" id="search-open" type="button" aria-label="Search" title="Search (Ctrl+K)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            </button>
            <button class="icon-button" id="lang-toggle" type="button" aria-label="Switch language" title="EN / FR">
                <span class="lang-label" data-lang-label>EN</span>
            </button>
            <button class="icon-button" id="theme-toggle" type="button" aria-label="Toggle dark mode" title="Toggle theme">
                <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </button>
            <button class="icon-button nav-burger" id="nav-toggle" type="button" aria-label="Open menu" aria-expanded="false">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
        </div>
    </div>
    <nav class="mobile-nav" id="mobile-nav" aria-label="Mobile navigation">
        {% for item in site.navigation %}
        <a href="{{ item.url | prepend: site.baseurl }}" {% if item.i18n %}data-i18n="{{ item.i18n }}"{% endif %}>{{ item.text }}</a>
        {% endfor %}
    </nav>
</header>
