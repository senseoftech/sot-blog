---
layout: default
---
<article class="post-full wrap">
    <header class="post-full-header">
        <h1 class="post-full-title">{{ page.title }}</h1>
    </header>
    {% if page.image %}
    <figure class="post-full-image">
        <img src="{{ page.image | prepend: site.baseurl }}" alt="{% if page.image_alt %}{{ page.image_alt }}{% else %}{{ page.title }}{% endif %}">
    </figure>
    {% endif %}
    <div class="post-content">
        {{ content }}
    </div>
</article>
